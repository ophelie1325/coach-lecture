<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mon Coach Dictées</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@500;600;700;800&display=swap');
:root{--bleu:#2563EB;--bleu-f:#1E40AF;--violet:#7C3AED;--violet-f:#5B21B6;--vert:#059669;--vert-f:#047857;--orange:#EA580C;--rose:#DB2777;--creme:#FAFAF8;--texte:#111827;--gris:#6B7280;--rouge:#DC2626}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#EFF6FF,#F5F3FF 60%,#FFF7ED);color:var(--texte);min-height:100%;display:flex;flex-direction:column;align-items:center;padding:0;overflow-x:hidden}
#app{width:100%;max-width:480px;flex:1;display:flex;flex-direction:column;padding:14px 16px 26px}
.bandeau{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.retour{font-size:22px;color:var(--violet);cursor:pointer;font-weight:800;background:#fff;border:2px solid #EDE9FE;border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.retour:active{transform:scale(.93)}
.titre-h{font-family:'Baloo 2';font-size:19px;font-weight:800;color:var(--violet-f);flex:1}
.test-badge{font-size:11px;font-weight:800;background:#FEF3C7;color:#B45309;border-radius:20px;padding:3px 10px}
h1{font-family:'Baloo 2';font-size:26px;font-weight:800;text-align:center;margin:10px 0 4px;background:linear-gradient(120deg,#7C3AED,#DB2777);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo{font-size:50px;text-align:center;margin-top:14px}
.accroche{color:var(--gris);font-size:15px;text-align:center;margin-bottom:18px}
.niv-cecrl{display:flex;flex-direction:column;gap:13px;margin-top:6px}
.cec{display:flex;align-items:center;gap:14px;background:#fff;border:2.5px solid #EDE9FE;border-radius:20px;padding:16px 18px;cursor:pointer;transition:transform .12s}
.cec:active{transform:scale(.97)}
.cec .pic{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;font-family:'Baloo 2';flex-shrink:0;color:#fff}
.cec.a1 .pic{background:var(--bleu)} .cec.a2 .pic{background:var(--vert)} .cec.b1 .pic{background:var(--violet)} .cec.b2 .pic{background:var(--orange)}
.cec .nom{font-family:'Baloo 2';font-size:18px;font-weight:800}
.cec .desc{font-size:13px;color:var(--gris);margin-top:1px}
.cec.sel{box-shadow:0 0 0 3px rgba(124,58,237,.25)}
.parc-tete{background:#fff;border:2.5px solid #EDE9FE;border-radius:20px;padding:16px 18px;margin-bottom:14px;display:flex;align-items:center;gap:14px}
.parc-tete .pic{font-size:34px}
.parc-tete .nom{font-family:'Baloo 2';font-size:19px;font-weight:800;color:var(--violet-f)}
.parc-tete .sous{font-size:13px;color:var(--gris)}
.chip-niveau{font-size:12px;font-weight:800;border-radius:20px;padding:3px 11px;color:#fff;cursor:pointer}
.niveaux{display:flex;flex-direction:column;gap:11px}
.niv-row{display:flex;align-items:center;gap:13px;background:#fff;border:2.5px solid #EDE9FE;border-radius:18px;padding:13px 16px;cursor:pointer;transition:transform .12s}
.niv-row:active{transform:scale(.97)}
.niv-row.lock{opacity:.5}
.niv-pic{width:46px;height:46px;border-radius:13px;background:#F5F3FF;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.niv-txt{flex:1}
.niv-nom{font-family:'Baloo 2';font-size:16px;font-weight:800}
.niv-mode{font-size:12.5px;color:var(--gris)}
.niv-fl{font-size:20px;color:#CBD5E1;font-weight:800}
.zone-jeu{background:#fff;border:2.5px solid #EDE9FE;border-radius:20px;padding:18px 16px;margin-top:4px;display:flex;flex-direction:column;gap:14px}
.consigne{font-size:15px;color:var(--violet-f);font-weight:700;text-align:center;line-height:1.4}
.btn-ecoute{align-self:center;background:var(--violet);color:#fff;border:none;border-radius:16px;padding:12px 22px;font-family:'Baloo 2';font-size:17px;font-weight:800;cursor:pointer;display:flex;align-items:center;gap:8px}
.btn-ecoute:active{transform:scale(.95)}
.btn-ecoute.lent{background:#EDE9FE;color:var(--violet-f)}
.ecoutes{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.zone-phrase{min-height:54px;border:2.5px dashed #DDD6FE;border-radius:14px;padding:10px;display:flex;flex-wrap:wrap;gap:7px;align-content:flex-start;background:#FCFBFF}
.etiq{background:#EDE9FE;color:var(--violet-f);border:2px solid #DDD6FE;border-radius:11px;padding:8px 13px;font-size:16px;font-weight:700;cursor:pointer;font-family:'Nunito'}
.etiq:active{transform:scale(.94)}
.etiq.placee{background:var(--violet);color:#fff;border-color:var(--violet)}
.banque-etiq{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.phrase-trous{font-size:18px;line-height:2;text-align:center;font-weight:600}
.trou{display:inline-block;min-width:62px;border-bottom:3px solid var(--violet);margin:0 3px;padding:0 4px;text-align:center;color:var(--violet-f);font-weight:800;cursor:pointer}
.trou.actif{background:#EDE9FE;border-radius:6px 6px 0 0}
.trou.ok{color:var(--vert-f);border-color:var(--vert)}
.trou.ko{color:var(--rouge);border-color:var(--rouge)}
.saisie{min-height:56px;border:2.5px solid #DDD6FE;border-radius:14px;padding:12px;font-size:18px;font-weight:600;background:#FCFBFF;line-height:1.5;word-break:break-word}
.saisie .curseur{display:inline-block;width:2px;height:22px;background:var(--violet);animation:cli .8s steps(1) infinite;vertical-align:middle}
@keyframes cli{50%{opacity:0}}
.clavier{display:flex;flex-direction:column;gap:6px;margin-top:2px}
.clav-row{display:flex;gap:5px;justify-content:center}
.touche{background:#fff;border:2px solid #E5E7EB;border-radius:9px;min-width:30px;height:44px;flex:1;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;cursor:pointer;font-family:'Nunito';color:var(--texte)}
.touche:active{transform:scale(.92);background:#EDE9FE}
.touche.sp{flex:0 0 auto;padding:0 12px;background:#F5F3FF;color:var(--violet-f);font-size:15px;font-weight:800}
.touche.espace{flex:1.4}
.touche.eff{background:#FEF2F2;color:var(--rouge)}
.touche.acc{background:#F0FDF4;color:var(--vert-f);font-size:16px}
.btn-valider{background:var(--vert);color:#fff;border:none;border-radius:16px;padding:13px;font-family:'Baloo 2';font-size:18px;font-weight:800;cursor:pointer;margin-top:4px}
.btn-valider:active{transform:scale(.97)}
.btn-valider:disabled{opacity:.4}
.feedback{text-align:center;font-family:'Baloo 2';font-size:18px;font-weight:800;min-height:26px;padding:6px}
.feedback.bon{color:var(--vert-f)} .feedback.mauvais{color:var(--rouge)}
.correction{background:#F0FDF4;border:2px solid #BBF7D0;border-radius:12px;padding:10px 13px;font-size:15px;text-align:center;color:#166534}
.correction .att{font-weight:800}
.progress-barre{height:9px;background:#EDE9FE;border-radius:10px;overflow:hidden;margin-bottom:4px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--violet),var(--rose));transition:width .3s}
.compte{font-size:13px;color:var(--gris);text-align:center}
.resultat{background:#fff;border:2.5px solid #EDE9FE;border-radius:22px;padding:26px 20px;text-align:center;margin-top:20px}
.resultat .big{font-size:54px}
.resultat h2{font-family:'Baloo 2';font-size:23px;color:var(--violet-f);margin:8px 0}
.resultat .score{font-size:17px;color:var(--gris);margin-bottom:16px}
.btn-rejouer{background:var(--violet);color:#fff;border:none;border-radius:16px;padding:13px 24px;font-family:'Baloo 2';font-size:17px;font-weight:800;cursor:pointer;margin:5px}
.btn-suite{background:var(--vert);color:#fff;border:none;border-radius:16px;padding:13px 24px;font-family:'Baloo 2';font-size:17px;font-weight:800;cursor:pointer;margin:5px}
.reglages{background:#fff;border:2.5px solid #EDE9FE;border-radius:20px;padding:18px;margin-top:6px;display:flex;flex-direction:column;gap:16px}
.reg-bloc label{font-family:'Baloo 2';font-size:15px;font-weight:800;color:var(--violet-f);display:block;margin-bottom:8px}
.seg{display:flex;gap:7px;flex-wrap:wrap}
.seg button{flex:1;min-width:60px;background:#F5F3FF;border:2px solid #EDE9FE;border-radius:12px;padding:9px;font-family:'Nunito';font-weight:700;font-size:14px;cursor:pointer}
.seg button.on{background:var(--violet);color:#fff;border-color:var(--violet)}
.pied{margin-top:auto;padding-top:18px;font-size:12px;color:#B6B6B6;text-align:center}
</style>
</head>

  else { choisis=[...jamais]; vus=[]; let reste=dispo.filter(x=>!choisis.includes(x)); choisis=choisis.concat(tire(reste,n-choisis.length)); }
  vus=vus.concat(choisis.map(x=>x.cle)); E.vus[id]=vus; sauver();
  return choisis;
}

/* ── parcours ── */
const NIVEAUX_CECRL = {
  A1:{nom:"A1 · Débutant", desc:"Phrases courtes et simples", coul:"a1"},
  A2:{nom:"A2 · Élémentaire", desc:"Des connecteurs, plus de détails", coul:"a2"},
  B1:{nom:"B1 · Intermédiaire", desc:"On explique, on raconte son parcours", coul:"b1"},
  B2:{nom:"B2 · Avancé", desc:"Textes développés et nuancés", coul:"b2"}
};
const COUL_CECRL={A1:"#2563EB",A2:"#059669",B1:"#7C3AED",B2:"#EA580C"};
const PARCOURS = { id:"presentation", titre:"Me présenter", picto:"🙋",
  niveaux:[
    {n:1, mode:"etiquettes", phr:1,    nom:"Les mots dans l'ordre", pic:"🔤"},
    {n:2, mode:"etiquettes", phr:2,    nom:"Deux phrases",          pic:"🔤"},
    {n:3, mode:"etiquettes", phr:"all",nom:"Tout le texte",         pic:"🔤"},
    {n:4, mode:"trous",      phr:2,    nom:"Complète les mots",     pic:"⬜"},
    {n:5, mode:"trous",      phr:"all",nom:"Complète le texte",     pic:"⬜"},
    {n:6, mode:"clavier",    phr:2,    nom:"Écris les phrases",     pic:"⌨️"},
    {n:7, mode:"clavier",    phr:"all",nom:"Écris le texte",        pic:"⌨️"},
    {n:8, mode:"bilan",      phr:"all",nom:"Bilan",                 pic:"🏆"}
  ]
};
const LIB_MODE={etiquettes:"Étiquettes",trous:"Trous",clavier:"Clavier",bilan:"Tout mélangé"};

/* ── normalisation / comparaison ── */
function sansAccents(s){ return s.normalize("NFD").replace(/[\u0300-\u036f]/g,""); }
function normMot(s){
  s=(s||"").toLowerCase().trim().replace(/[''`]/g,"'").replace(/[.,!?;:«»"]/g,"").replace(/\s+/g," ");
  if(E.reglages.accents) s=sansAccents(s);
  return s;
}
function egalMot(a,b){ return normMot(a)===normMot(b); }
function egalPhrase(a,b){
  const na=normMot(a).replace(/\s+/g," ").trim(), nb=normMot(b).replace(/\s+/g," ").trim();
  return na===nb;
}

/* ── construction d'une session ── */
/* pool de TOUTES les phrases de tous les personnages (pour le niveau « 1 phrase ») */
function poolPhrases(niv){
  const pool=[];
  DATA.ordre.forEach(nom=>{
    DATA.textes[nom][niv].phrases.forEach((p,i)=>pool.push({cle:nom+"#"+i, nom, phrase:p}));
  });
  return pool;
}
function construire(lvl){
  const def=PARCOURS.niveaux.find(x=>x.n===lvl);
  let nom, etapes;

  if(def.mode!=="bilan" && def.phr===1){
    /* 1 phrase : on pioche dans TOUTES les phrases de tous les personnages,
       sans répétition → variété maximale (langues, métier, goûts… pas que « Je m'appelle ») */
    const pool=poolPhrases(E.niveau);
    const [c]=tirerSansRepeter(`pres-ph1-${E.niveau}`, pool, 1);
    nom=c.nom;
    etapes=[{phrase:c.phrase, mode:def.mode}];
  } else {
    /* un personnage (sans répétition) + fenêtre de phrases à un endroit ALÉATOIRE du texte */
    const dispo=DATA.ordre.map(n=>({cle:n,nom:n}));
    const [c]=tirerSansRepeter(`pres-${lvl}-${E.niveau}`, dispo, 1);
    nom=c.nom;
    const t=DATA.textes[nom][E.niveau];
    let phrases;
    if(def.phr==="all"){
      phrases=t.phrases;
    } else {
      const n=Math.min(def.phr, t.phrases.length);
      const maxStart=Math.max(0, t.phrases.length-n);
      const start=Math.floor(Math.random()*(maxStart+1));
      phrases=t.phrases.slice(start, start+n);
    }
    if(def.mode==="bilan"){
      const modes=["etiquettes","trous","clavier"];
      etapes=phrases.map((p,i)=>({phrase:p, mode:modes[i%3]}));
    } else {
      etapes=phrases.map(p=>({phrase:p, mode:def.mode}));
    }
  }
  return {lvl, def, nom, etapes, idx:0, score:0, total:etapes.length};
}
let S=null;

/* ════ ÉCRANS ════ */
const app=()=>document.getElementById("app");
function vers(html){ app().innerHTML=html; }

function pied(){ return `<div class="pied">Mon Coach Dictées · v${VERSION}</div>`; }
function bandeau(titre, onRetour){
  return `<div class="bandeau"><div class="retour" id="ret">‹</div><div class="titre-h">${titre}</div>${ouvert?'<div class="test-badge">🔓 test</div>':''}</div>`;
}

/* choix du niveau CECRL */
function ecranNiveau(premier){
  let cards="";
  for(const k of ["A1","A2","B1","B2"]){
    const c=NIVEAUX_CECRL[k];
    cards+=`<div class="cec ${c.coul} ${E.niveau===k?'sel':''}" data-niv="${k}">
      <div class="pic">${k}</div><div><div class="nom">${c.nom}</div><div class="desc">${c.desc}</div></div></div>`;
  }
  vers(`${premier?'':bandeau("Mon niveau")}
    <div class="logo">📝</div><h1>Mon Coach Dictées</h1>
    <div class="accroche">${premier?'Choisis ton niveau pour commencer':'Tu peux changer de niveau'}</div>
    <div class="niv-cecrl">${cards}</div>${pied()}`);
  if(!premier){ document.getElementById("ret").onclick=()=>ecranAccueil(); }
  document.querySelectorAll(".cec").forEach(el=>el.onclick=()=>{
    E.niveau=el.dataset.niv; sauver(); ecranAccueil();
  });
}

/* accueil parcours */
function ecranAccueil(){
  const p=prenom();
  const chip=`<span class="chip-niveau" id="chg" style="background:${COUL_CECRL[E.niveau]}">${E.niveau} ✎</span>`;
  let rows="";
  for(const d of PARCOURS.niveaux){
    const fait=E.faits[`${d.n}-${E.niveau}`];
    rows+=`<div class="niv-row" data-lvl="${d.n}">
      <div class="niv-pic">${d.pic}</div>
      <div class="niv-txt"><div class="niv-nom">${d.n}. ${d.nom}</div>
        <div class="niv-mode">${LIB_MODE[d.mode]}${d.phr==="all"?" · texte complet":d.phr===1?" · 1 phrase":" · "+d.phr+" phrases"}${fait?" ✓":""}</div></div>
      <div class="niv-fl">›</div></div>`;
  }
  vers(`${bandeau(PARCOURS.titre)}
    <div class="parc-tete"><div class="pic">${PARCOURS.picto}</div>
      <div style="flex:1"><div class="nom">${PARCOURS.titre}</div><div class="sous">${p?p+', ':''}écris des présentations sous la dictée</div></div>
      ${chip}</div>
    <div class="niveaux">${rows}</div>${pied()}`);
  document.getElementById("ret").onclick=()=>{ try{location.href="index.html";}catch(e){} };
  document.getElementById("chg").onclick=()=>ecranNiveau(false);
  document.querySelectorAll(".niv-row").forEach(el=>el.onclick=()=>lancer(parseInt(el.dataset.lvl)));
}

/* ── lancer un niveau ── */
function lancer(lvl){ S=construire(lvl); etape(); }

function barre(){
  const pct = S.total? Math.round(S.idx/S.total*100):0;
  return `<div class="progress-barre"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="compte">${Math.min(S.idx+1,S.total)} / ${S.total}</div>`;
}

function etape(){
  if(S.idx>=S.etapes.length){ return resultat(); }
  const e=S.etapes[S.idx];
  if(e.mode==="etiquettes") rendEtiquettes(e);
  else if(e.mode==="trous") rendTrous(e);
  else rendClavier(e);
}

function teteJeu(consigne){
  return `${bandeau(S.def.nom)}${barre()}<div class="zone-jeu"><div class="consigne">${consigne}</div>
    <div class="ecoutes">
      <button class="btn-ecoute" id="ec">🔊 Écouter</button>
      <button class="btn-ecoute lent" id="ecl">🐢 Lentement</button>
    </div>`;
}
function brancherEcoute(txt){
  document.getElementById("ret").onclick=()=>{ try{speechSynthesis.cancel();}catch(e){} ecranAccueil(); };
  document.getElementById("ec").onclick=()=>dire(txt,false);
  document.getElementById("ecl").onclick=()=>dire(txt,true);
}

/* ── MODE ÉTIQUETTES ── */
function rendEtiquettes(e){
  const mots=e.phrase.mots;
  const ordreMel=melange(mots.map((m,i)=>({m,i})));
  let placees=[]; // indices d'origine placés, dans l'ordre choisi
  vers(`${teteJeu("Écoute, puis remets les mots dans l'ordre 👇")}
    <div class="zone-phrase" id="zp"></div>
    <div class="banque-etiq" id="bq"></div>
    <div class="feedback" id="fb"></div>
    <button class="btn-valider" id="val" disabled>Vérifier</button>
    </div>${pied()}`);
  brancherEcoute(e.phrase.t);
  const zp=document.getElementById("zp"), bq=document.getElementById("bq"), val=document.getElementById("val");
  function redraw(){
    zp.innerHTML=""; bq.innerHTML="";
    placees.forEach((oi,pos)=>{
      const b=document.createElement("div"); b.className="etiq placee"; b.textContent=mots[oi];
      b.onclick=()=>{ placees.splice(pos,1); redraw(); };
      zp.appendChild(b);
    });
    ordreMel.forEach(o=>{
      if(placees.includes(o.i)) return;
      const b=document.createElement("div"); b.className="etiq"; b.textContent=o.m;
      b.onclick=()=>{ placees.push(o.i); redraw(); };
      bq.appendChild(b);
    });
    val.disabled = placees.length!==mots.length;
  }
  redraw();
  setTimeout(()=>dire(e.phrase.t,false),250);
  val.onclick=()=>{
    const propose=placees.map(i=>mots[i]);
    const bon = propose.join(" ")===mots.join(" ");
    const fb=document.getElementById("fb");
    if(bon){ S.score++; fb.className="feedback bon"; fb.textContent="✅ Bravo !"; val.disabled=true;
      setTimeout(()=>{ S.idx++; etape(); }, 900);
    } else {
      fb.className="feedback mauvais"; fb.textContent="❌ Pas tout à fait, réécoute et réessaie";
      dire(e.phrase.t,true);
    }
  };
}

/* ── MODE TROUS ── */
function rendTrous(e){
  const mots=e.phrase.mots, trous=e.phrase.trous;
  const saisies={}; trous.forEach(i=>saisies[i]="");
  let actif = trous.length? trous[0] : null;
  vers(`${teteJeu("Écoute, puis complète les mots qui manquent ✏️")}
    <div class="phrase-trous" id="pt"></div>
    <div class="feedback" id="fb"></div>
    <div class="clavier" id="clav"></div>
    <button class="btn-valider" id="val">Vérifier</button>
    </div>${pied()}`);
  brancherEcoute(e.phrase.t);
  const pt=document.getElementById("pt");
  function dessine(){
    pt.innerHTML="";
    mots.forEach((m,i)=>{
      if(trous.includes(i)){
        const sp=document.createElement("span");
        sp.className="trou"+(i===actif?" actif":"");
        sp.textContent=saisies[i]||"____";
        sp.onclick=()=>{ actif=i; dessine(); };
        pt.appendChild(sp);
      } else {
        const sp=document.createElement("span"); sp.textContent=m+" "; pt.appendChild(sp);
      }
      pt.appendChild(document.createTextNode(" "));
    });
  }
  dessine();
  monterClavier(document.getElementById("clav"), {
    car:(c)=>{ if(actif!=null){ saisies[actif]+=c; dessine(); } },
    eff:()=>{ if(actif!=null){ saisies[actif]=saisies[actif].slice(0,-1); dessine(); } },
    espace:null
  });
  setTimeout(()=>dire(e.phrase.t,false),250);
  document.getElementById("val").onclick=()=>{
    let tout=true;
    const fb=document.getElementById("fb");
    pt.querySelectorAll(".trou").forEach(()=>{});
    // évaluer
    let ok=0;
    trous.forEach(i=>{
      const cible=mots[i];
      if(egalMot(saisies[i], cible)) ok++; else tout=false;
    });
    dessine();
    // colorier
    let k=0;
    pt.querySelectorAll(".trou").forEach((el)=>{
      const i=trous[k++]; el.classList.remove("actif");
      if(egalMot(saisies[i],mots[i])) el.classList.add("ok"); else el.classList.add("ko");
    });
    if(tout){ S.score++; fb.className="feedback bon"; fb.textContent="✅ Parfait !";
      setTimeout(()=>{ S.idx++; etape(); },950);
    } else {
      fb.className="feedback mauvais"; fb.textContent="❌ Regarde les mots en rouge";
      const corr=document.createElement("div"); corr.className="correction";
      corr.innerHTML="La phrase : <span class='att'>"+e.phrase.t+"</span>";
      fb.after(corr);
      document.getElementById("val").textContent="Continuer";
      document.getElementById("val").onclick=()=>{ S.idx++; etape(); };
    }
  };
}

/* ── MODE CLAVIER ── */
function rendClavier(e){
  let saisie="";
  vers(`${teteJeu("Écoute, puis écris la phrase ⌨️")}
    <div class="saisie" id="sa"></div>
    <div class="feedback" id="fb"></div>
    <div class="clavier" id="clav"></div>
    <button class="btn-valider" id="val">Vérifier</button>
    </div>${pied()}`);
  brancherEcoute(e.phrase.t);
  const sa=document.getElementById("sa");
  function dessine(){ sa.innerHTML=(saisie.replace(/</g,"&lt;"))+'<span class="curseur"></span>'; }
  dessine();
  monterClavier(document.getElementById("clav"), {
    car:(c)=>{ saisie+=c; dessine(); },
    eff:()=>{ saisie=saisie.slice(0,-1); dessine(); },
    espace:()=>{ saisie+=" "; dessine(); }
  });
  setTimeout(()=>dire(e.phrase.t,false),250);
  document.getElementById("val").onclick=()=>{
    const fb=document.getElementById("fb");
    if(egalPhrase(saisie, e.phrase.t)){
      S.score++; fb.className="feedback bon"; fb.textContent="✅ Bravo, c'est exact !";
      setTimeout(()=>{ S.idx++; etape(); },1000);
    } else {
      fb.className="feedback mauvais"; fb.textContent="❌ Presque ! Voici la phrase :";
      const corr=document.createElement("div"); corr.className="correction";
      corr.innerHTML="<span class='att'>"+e.phrase.t+"</span>";
      fb.after(corr);
      document.getElementById("val").textContent="Continuer";
      document.getElementById("val").onclick=()=>{ S.idx++; etape(); };
    }
  };
}

/* ── clavier maison ── */
function monterClavier(cont, h){
  const rows=[ "azertyuiop", "qsdfghjklm", "wxcvbn" ];
  const accents="éèàçêâîôûœ";
  let html="";
  html+='<div class="clav-row">'+"1234567890".split("").map(c=>`<div class="touche" data-c="${c}">${c}</div>`).join("")+'</div>';
  rows.forEach(r=>{ html+='<div class="clav-row">'+r.split("").map(c=>`<div class="touche" data-c="${c}">${c}</div>`).join("")+'</div>'; });
  html+='<div class="clav-row">'+accents.split("").map(c=>`<div class="touche acc" data-c="${c}">${c}</div>`).join("")+'</div>';
  html+='<div class="clav-row">';
  if(h.espace){ html+='<div class="touche sp" data-act="apos">\'</div><div class="touche espace" data-act="space">espace</div>'; }
  else { html+='<div class="touche sp" data-act="apos">\'</div>'; }
  html+='<div class="touche sp eff" data-act="eff">⌫ effacer</div></div>';
  cont.innerHTML=html;
  cont.querySelectorAll(".touche").forEach(t=>{
    t.onclick=()=>{
      const act=t.dataset.act;
      if(act==="eff") h.eff();
      else if(act==="space" && h.espace) h.espace();
      else if(act==="apos") h.car("'");
      else if(t.dataset.c!=null) h.car(t.dataset.c);
    };
  });
}

/* ── résultat ── */
function resultat(){
  E.faits[`${S.lvl}-${E.niveau}`]=true; sauver();
  const sc=S.score, tot=S.total;
  const parfait = sc===tot;
  const emo = parfait?"🌟":(sc>=tot/2?"👍":"💪");
  vers(`${bandeau(S.def.nom)}
    <div class="resultat">
      <div class="big">${emo}</div>
      <h2>${parfait?"Parfait !":"Bien joué !"}</h2>
      <div class="score">${sc} / ${tot} ${tot>1?"réussites":"réussite"}</div>
      <div><button class="btn-rejouer" id="rej">🔁 Un autre</button>
      <button class="btn-suite" id="suite">Continuer ›</button></div>
    </div>${pied()}`);
  document.getElementById("ret").onclick=()=>ecranAccueil();
  document.getElementById("rej").onclick=()=>lancer(S.lvl);
  document.getElementById("suite").onclick=()=>{
    const i=PARCOURS.niveaux.findIndex(x=>x.n===S.lvl);
    if(i>=0 && i+1<PARCOURS.niveaux.length) lancer(PARCOURS.niveaux[i+1].n);
    else ecranAccueil();
  };
}

/* ── démarrage ── */
function start(){
  if(!E.niveau) ecranNiveau(true);
  else ecranAccueil();
}
start();
</script>
