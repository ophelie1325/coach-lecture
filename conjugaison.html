<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mon Coach Conjugaison</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@500;600;700;800&display=swap');
:root{--bleu:#2563EB;--bleu-f:#1E40AF;--violet:#7C3AED;--violet-f:#5B21B6;--vert:#059669;--vert-p:#ECFDF5;
--orange:#EA580C;--rouge:#DC2626;--rouge-p:#FEF2F2;--jaune:#D97706;--creme:#FAFAF8;--texte:#111827;--gris:#6B7280;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Nunito',sans-serif;background:var(--creme);color:var(--texte);min-height:100%;overflow-x:hidden}
.wrap{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.btn-ico{background:#EDE9FE;border:none;border-radius:14px;width:54px;height:54px;font-size:24px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:transform .1s}
.btn-ico:active{transform:scale(.9)}
.hidden{display:none!important}
/* topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:14px 16px;position:sticky;top:0;background:var(--creme);z-index:10}
.topbar .back{font-size:22px;color:var(--violet);font-weight:800;cursor:pointer;text-decoration:none}
.topbar .titre{flex:1;font-family:'Baloo 2';font-weight:800;font-size:17px;color:var(--violet-f)}
.barre{height:10px;background:#EDE9FE;border-radius:10px;overflow:hidden;flex:1}
.barre-i{height:100%;background:linear-gradient(90deg,#7C3AED,#A78BFA);border-radius:10px;transition:width .3s}
/* accueil */
.acc-logo{font-size:46px;text-align:center;margin:14px 0 2px}
.acc-titre{font-family:'Baloo 2';font-size:23px;font-weight:800;text-align:center;color:var(--violet-f)}
.acc-salut{text-align:center;color:var(--gris);font-size:15px;margin-bottom:16px}
.parcours-list{display:flex;flex-direction:column;gap:13px;padding:8px 16px 30px}
.pcard{display:flex;align-items:center;gap:14px;background:#fff;border:2.5px solid #EDE9FE;border-radius:20px;padding:15px 17px;cursor:pointer;transition:transform .12s,box-shadow .12s;box-shadow:0 3px 10px rgba(0,0,0,.03)}
.pcard:active{transform:scale(.98)}
.pcard.lock{opacity:.5}
.pcard-ico{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:27px;flex-shrink:0;background:#EDE9FE}
.pcard-txt{flex:1}
.pcard-nom{font-family:'Baloo 2';font-size:17px;font-weight:800;color:var(--violet-f)}
.pcard-sous{font-size:13px;color:var(--gris)}
.pcard-etoiles{font-size:13px;margin-top:2px}
.pcard-fleche{font-size:20px;color:#CBD5E1}
/* chemin de niveaux */
.niveaux{display:flex;flex-direction:column;gap:11px;padding:10px 16px 30px}
.ncard{display:flex;align-items:center;gap:13px;background:#fff;border:2px solid #EDE9FE;border-radius:16px;padding:13px 15px;cursor:pointer;transition:transform .1s}
.ncard:active{transform:scale(.98)}
.ncard.lock{opacity:.45;cursor:default}
.ncard.done{border-color:#A78BFA;background:#FBFAFF}
.ncard-num{width:38px;height:38px;border-radius:12px;background:#EDE9FE;color:var(--violet-f);font-family:'Baloo 2';font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ncard.done .ncard-num{background:var(--violet);color:#fff}
.ncard-txt{flex:1}
.ncard-titre{font-weight:800;font-size:15px}
.ncard-et{font-size:13px;color:var(--jaune)}
.ncard-lock-ico{font-size:18px;color:#CBD5E1}
/* session */
.session{flex:1;display:flex;flex-direction:column;padding:0 18px}
.consigne{display:flex;align-items:center;gap:10px;background:#EDE9FE;border-radius:16px;padding:12px 15px;margin:6px 0 14px}
.consigne-txt{flex:1;font-weight:700;font-size:15px;color:var(--violet-f)}
.consigne .btn-ico{width:42px;height:42px;font-size:19px;background:#fff}
.zone{flex:1;display:flex;flex-direction:column;justify-content:flex-start;gap:14px;padding-top:6px}
.q-grande{font-family:'Baloo 2';font-size:23px;font-weight:700;text-align:center;line-height:1.5;padding:10px 6px}
.q-grande .trou{display:inline-block;min-width:60px;border-bottom:3px dashed #A78BFA;color:#A78BFA;font-weight:800}
.q-grande .rempli{color:var(--violet-f)}
.q-audio{display:flex;gap:10px;justify-content:center}
.choix{display:flex;flex-direction:column;gap:11px;margin-top:4px}
.choix.ligne{flex-direction:row;flex-wrap:wrap;justify-content:center}
.cbtn{background:#fff;border:2.5px solid #DDD6FE;border-radius:16px;padding:15px 18px;font-family:'Nunito';font-size:18px;font-weight:800;color:var(--texte);cursor:pointer;transition:all .12s;text-align:center}
.choix.ligne .cbtn{flex:0 1 auto;min-width:90px}
.cbtn:active{transform:scale(.97)}
.cbtn .picto{font-size:24px;margin-right:6px}
.cbtn.ok{background:var(--vert-p);border-color:var(--vert);color:var(--vert)}
.cbtn.ko{background:var(--rouge-p);border-color:var(--rouge);color:var(--rouge)}
.cbtn.audio{display:flex;align-items:center;justify-content:center;gap:10px}
.cbtn.audio::before{content:"🔊";font-size:20px}
.cbtn.dim{opacity:.4}
/* mots à toucher (trouve le verbe/sujet) */
.phrase-mots{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:10px}
.mot{background:#fff;border:2px solid #DDD6FE;border-radius:12px;padding:11px 15px;font-size:18px;font-weight:700;cursor:pointer;transition:all .1s}
.mot:active{transform:scale(.95)}
.mot.ok{background:var(--vert-p);border-color:var(--vert);color:var(--vert)}
.mot.ko{background:var(--rouge-p);border-color:var(--rouge);color:var(--rouge)}
/* étiquettes à remettre dans l'ordre */
.ordre-zone{display:flex;flex-direction:column;gap:14px}
.ordre-cible{min-height:56px;border:2.5px dashed #DDD6FE;border-radius:14px;display:flex;flex-wrap:wrap;gap:7px;padding:10px;align-items:center;justify-content:center}
.ordre-source{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.etiq{background:#EDE9FE;border:2px solid #C4B5FD;border-radius:12px;padding:10px 14px;font-size:16px;font-weight:700;color:var(--violet-f);cursor:pointer;transition:transform .1s}
.etiq:active{transform:scale(.95)}
.etiq.placed{background:#fff}
/* notion (mini-leçon) */
.lecon{background:linear-gradient(135deg,#F5F3FF,#EDE9FE);border:2px solid #C4B5FD;border-radius:18px;padding:18px 18px 20px;text-align:center}
.lecon-emoji{font-size:40px;margin-bottom:6px}
.lecon-titre{font-family:'Baloo 2';font-size:19px;font-weight:800;color:var(--violet-f);margin-bottom:6px}
.lecon-txt{font-size:15.5px;line-height:1.5;color:var(--texte)}
.lecon-txt b{color:var(--violet-f)}
.lecon-ex{margin-top:10px;background:#fff;border-radius:12px;padding:10px;font-size:15px;font-weight:700}
.btn-suite{background:var(--violet);color:#fff;border:none;border-radius:16px;padding:15px;font-family:'Baloo 2';font-size:18px;font-weight:800;cursor:pointer;width:100%;margin-top:4px}
.btn-suite:active{transform:scale(.98)}
/* feedback */
.feedback{text-align:center;font-family:'Baloo 2';font-size:18px;font-weight:800;min-height:26px;padding:6px}
.feedback.bon{color:var(--vert)}
.feedback.mauvais{color:var(--rouge)}
.barre-bas{padding:14px 18px 22px}
.btn-valider{background:var(--violet);color:#fff;border:none;border-radius:16px;padding:15px;font-family:'Baloo 2';font-size:18px;font-weight:800;cursor:pointer;width:100%}
.btn-valider:active{transform:scale(.98)}
.btn-valider:disabled{background:#CBD5E1}
/* résultat */
.resultat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:30px 20px;text-align:center}
.res-emoji{font-size:64px}
.res-titre{font-family:'Baloo 2';font-size:26px;font-weight:800;color:var(--violet-f)}
.res-score{font-size:18px;color:var(--gris)}
.res-etoiles{font-size:40px;letter-spacing:6px}
.res-btns{display:flex;flex-direction:column;gap:11px;width:100%;max-width:300px;margin-top:10px}
/* clavier maison (mode avancé) */
.clavier{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-top:8px}
.touche{background:#fff;border:2px solid #DDD6FE;border-radius:9px;width:30px;height:40px;font-size:17px;font-weight:700;cursor:pointer}
.touche.large{width:auto;padding:0 14px}
.saisie-box{border:2.5px solid #DDD6FE;border-radius:14px;min-height:48px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:var(--violet-f);padding:8px;font-family:'Baloo 2'}
/* réglages */
.reglages{padding:16px;display:flex;flex-direction:column;gap:14px}
.reg-card{background:#fff;border:2px solid #EDE9FE;border-radius:16px;padding:16px}
.reg-titre{font-family:'Baloo 2';font-weight:800;font-size:16px;color:var(--violet-f);margin-bottom:10px}
.toggle{display:flex;align-items:center;justify-content:space-between;gap:12px}
.toggle-label{font-size:15px;font-weight:700}
.toggle-desc{font-size:12.5px;color:var(--gris);margin-top:2px}
.switch{width:54px;height:30px;border-radius:30px;background:#CBD5E1;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.switch.on{background:var(--violet)}
.switch::after{content:"";position:absolute;width:24px;height:24px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s}
.switch.on::after{left:27px}
select{font-family:'Nunito';font-size:15px;font-weight:700;border:2px solid #DDD6FE;border-radius:10px;padding:8px;width:100%}
.lien-pied{text-align:center;padding:16px;font-size:13px;color:var(--gris)}
.lien-pied a{color:var(--violet);font-weight:700;cursor:pointer}
.mode-oral-actif body, body.mode-oral .q-grande .txt-cache{visibility:hidden}
</style>
</head>

function parler(texte, opt){
  return new Promise(res=>{
    if(!window.speechSynthesis){ res(); return; }
    try{ speechSynthesis.cancel(); }catch(e){}
    const u = new SpeechSynthesisUtterance(texte);
    const v = voixChoisie(); if(v) u.voice = v;
    u.lang = 'fr-FR';
    u.rate = (opt && opt.lent) ? 0.6 : 0.92;
    u.onend = ()=>res(); u.onerror = ()=>res();
    try{ speechSynthesis.speak(u); }catch(e){ res(); }
  });
}

function melange(arr){ return [...arr].sort(()=>Math.random()-0.5); }

/* anti-répétition : épuise la banque avant de répéter */
function tirerSansRepeter(cle, items, n){
  if(!E.vus[cle]) E.vus[cle]=[];
  let vus = E.vus[cle];
  const cles = items.map((x,i)=> x.__k!==undefined ? x.__k : i);
  items.forEach((x,i)=>{ if(x.__k===undefined) x.__k=i; });
  vus = vus.filter(k=>cles.includes(k));
  let jamais = items.filter(x=>!vus.includes(x.__k));
  let choisis;
  if(jamais.length>=n){ choisis = tire(jamais,n); }
  else { choisis=[...jamais]; vus=[]; const reste=items.filter(x=>!choisis.includes(x)); choisis=choisis.concat(tire(reste,n-choisis.length)); }
  vus = vus.concat(choisis.map(x=>x.__k));
  E.vus[cle]=vus; sauver();
  return choisis;
}

/* ─── Conjugaison : helpers ─── */
// forme conjuguée d'un verbe à un temps + personne (0..5)
function conjugue(inf, temps, p){
  const v = VERBI[inf]; if(!v) return "";
  if(temps==="pres") return formeAvecPronom(v, v.pres[p], p);
  if(temps==="fut")  return formeAvecPronom(v, v.fut[p], p);
  if(temps==="cond") return formeAvecPronom(v, v.cond[p], p);
  return v.pres[p];
}
// gère élision je->j' et pronominaux déjà inclus
function formeAvecPronom(v, forme, p){
  // pour les pronominaux, la forme contient déjà me/te/se...
  return forme;
}
// pronom sujet affiché pour la personne p (gère je/j')
function pronomSujet(p, forme){
  const base = ["je","tu","il","nous","vous","ils"][p];
  if(p===0 && /^[aeéèêiouh]/i.test(forme)) return "j'";
  return base+" ";
}
// passé composé complet
function passeCompose(inf, p){
  const v = VERBI[inf]; if(!v) return "";
  let pp = v.pp;
  if(v.pron){
    // pronom sujet + pronom réfléchi (avec élision) + être + participe accordé
    const sujets=["je","tu","il","nous","vous","ils"];
    const reflBruts=["me","te","se","nous","vous","se"];
    const auxE = VERBI["être"].pres[p];
    let refl = reflBruts[p];
    // élision me/te/se devant voyelle de l'auxiliaire (suis, es, est, sommes, êtes, sont)
    if((refl==="me"||refl==="te"||refl==="se") && /^[aeéèêiouhy]/i.test(auxE)){
      refl = refl[0]+"'";
    } else { refl = refl+" "; }
    // accord : pluriel -> +s (nous, vous, ils). Masculin par défaut.
    const ppA = (p>=3) ? pp+"s" : pp;
    return sujets[p]+" "+refl+auxE+" "+ppA;
  }
  const auxConj = v.aux==="être" ? VERBI["être"].pres[p] : VERBI["avoir"].pres[p];
  let pp2 = pp;
  // accord avec être pour les non-pronominaux aussi au pluriel (ils sont allés)
  if(v.aux==="être" && p>=3) pp2 = pp+"s";
  const suj = pronomSujet(p, auxConj);
  return suj+auxConj+" "+pp2;
}

/* ════════════ SESSION ════════════ */
function lancer(pid, lvl){
  const def = B[pid][lvl];
  // mini-leçon + démo avant les niveaux d'initiation (et notions)
  if(def.type==="notion"){ return ecranNotion(pid, lvl); }
  demarrerSession(pid, lvl);
}

function demarrerSession(pid, lvl){
  const def = B[pid][lvl];
  const qs = genQuestions(pid, lvl);
  SESSION = { pid, lvl, def, qs, idx:0, bonnes:0, total:qs.length };
  ECRAN="session";
  afficherQuestion();
}

function genQuestions(pid, lvl){
  const def = B[pid][lvl];
  if(def.type==="bilan") return genBilan(pid, lvl, def.n||10);
  if(def.type==="notion") return genNotionExo(def.sousType);
  const n = NB_QUESTIONS[def.type] || 8;
  return construireItems(pid, lvl, def, n);
}

// après une mini-leçon, un petit exercice de reconnaissance lié à la notion
function genNotionExo(sous){
  if(sous==="verbe"||sous==="sujet"||sous==="objet"){
    const cible = sous==="objet"?"objet":sous;
    return D.phrases_analyse.filter(ph=> (cible==="objet"?ph.objet.length:1)).slice(0,6).map((ph,i)=>({
      type:"trouveMot", cible, mots:ph.mots,
      bons: cible==="verbe"?[ph.verbe]:cible==="sujet"?ph.sujet:ph.objet, __k:i,
      consigne: cible==="verbe"?"Touche le verbe (l'action).":cible==="sujet"?"Touche le sujet (qui fait l'action).":"Touche le complément (quoi ?)."
    }));
  }
  if(sous==="pronom"){
    return D.pronom_sens.slice(0,6).map((x,i)=>({type:"pronomSens", pron:x.pron, sens:x.sens, emoji:x.emoji,
      distract: melange(D.pronom_sens.filter(y=>y.pron!==x.pron)).slice(0,2).map(y=>y.sens), __k:i}));
  }
  // notions de temps (pc, fp, imp, fs, pr, cond) : reconnaître une phrase à ce temps
  const map={pc:"pc",fp:"fp",pr:"pr",fs:"fut",cond:"cond",imp:"imp"};
  const tps=map[sous]||"pres";
  const verbes = VERB_ORDRE.filter(v=>!VERBI[v].pron).slice(0,12);
  return verbes.slice(0,6).map((inf,i)=>({type:"reconnaitreTemps", inf, temps:tps, p:Math.floor(Math.random()*6), __k:i,
    consigne:"Est-ce que c'est bien le bon temps ? Touche OUI ou NON."}));
}

function genBilan(pid, lvl, n){
  // pioche dans les niveaux précédents du même parcours
  const dispo = [];
  Object.keys(B[pid]).map(k=>parseInt(k)).filter(l=>l<lvl).forEach(l=>{
    const def=B[pid][l];
    if(def.type!=="bilan" && def.type!=="notion"){
      const items = construireItems(pid, l, def, 3);
      items.forEach(it=>dispo.push(it));
    }
  });
  return tire(dispo, Math.min(n, dispo.length));
}

function afficherQuestion(){
  const s = SESSION;
  if(s.idx >= s.qs.length){ return ecranResultat(); }
  const q = s.qs[s.idx];
  const def = s.def;
  const pct = Math.round((s.idx)/s.total*100);
  const p = PARCOURS.find(x=>x.id===s.pid);
  // squelette
  vue(`
    <div class="topbar">
      <span class="back" onclick="quitterSession()">✕</span>
      <div class="barre"><div class="barre-i" style="width:${pct}%"></div></div>
      <span style="font-weight:800;color:var(--violet-f);font-size:14px">${s.idx+1}/${s.total}</span>
    </div>
    <div class="session">
      <div class="consigne">
        <button class="btn-ico" onclick="rejouerConsigne()">🔊</button>
        <div class="consigne-txt" id="consigne-txt">${q.consigne||CONSIGNE_DEFAUT[q.type]||''}</div>
      </div>
      <div class="zone" id="zone"></div>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="barre-bas hidden" id="barre-bas">
      <button class="btn-valider" id="btn-suite" onclick="questionSuivante()">Continuer →</button>
    </div>
  `);
  const zone = $("#zone");
  // lire la consigne automatiquement
  const ct = $("#consigne-txt").textContent;
  if(ct) parler(ct);
  // appeler le renderer
  const r = RENDUS[q.type];
  if(r){ r(q, zone); }
  else { zone.innerHTML = `<div class="q-grande">⚠️ type inconnu : ${q.type}</div>`; }
}

function rejouerConsigne(){ const t=$("#consigne-txt"); if(t) parler(t.textContent); }

function bonneReponse(){
  SESSION.bonnes++;
  const fb=$("#feedback"); fb.className="feedback bon"; fb.textContent = pick(["Bravo ! 🌟","Super ! 👏","Oui ! ✅","Parfait ! 🎉"]);
}
function mauvaiseReponse(corr){
  const fb=$("#feedback"); fb.className="feedback mauvais"; fb.textContent = corr?("La réponse : "+corr):"Presque !";
}
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }

function finQuestion(ok, corr){
  if(ok) bonneReponse(); else mauvaiseReponse(corr);
  $("#barre-bas").classList.remove("hidden");
}
function questionSuivante(){ SESSION.idx++; afficherQuestion(); }
function quitterSession(){ ecranParcours(SESSION.pid); }

function ecranResultat(){
  const s=SESSION; ECRAN="resultat";
  const pct = s.total ? Math.round(s.bonnes/s.total*100) : 0;
  let stars = pct>=90?3 : pct>=70?2 : pct>=50?1 : 0;
  // enregistrer
  if(!E.parcours[s.pid]) E.parcours[s.pid]={};
  const prev = E.parcours[s.pid][s.lvl];
  if(!prev || stars>prev.stars) E.parcours[s.pid][s.lvl]={stars};
  // série
  const auj = new Date().toDateString();
  if(E.serie.dernier!==auj){ E.serie.n=(E.serie.dernier? E.serie.n:0)+1; E.serie.dernier=auj; }
  sauver();
  const emoji = stars>=3?"🏆":stars>=2?"🌟":stars>=1?"👍":"💪";
  const msg = stars>=2?"Excellent travail !":stars>=1?"Bien joué !":"Continue, tu vas y arriver !";
  vue(`
    <div class="resultat">
      <div class="res-emoji">${emoji}</div>
      <div class="res-titre">${msg}</div>
      <div class="res-etoiles">${'⭐'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
      <div class="res-score">${s.bonnes} / ${s.total} bonnes réponses</div>
      <div class="res-btns">
        <button class="btn-suite" onclick="lancer('${s.pid}',${s.lvl})">↺ Recommencer</button>
        <button class="btn-suite" style="background:#EDE9FE;color:var(--violet-f)" onclick="ecranParcours('${s.pid}')">Continuer</button>
      </div>
    </div>
  `);
  parler(msg);
}

/* ════════════ CONSTRUCTEURS D'ITEMS ════════════ */
// Renvoie un tableau de questions {type, ...} selon le niveau
function construireItems(pid, lvl, def, n){
  const cle = pid+"-"+lvl;
  const t = def.type;
  let pool = [];

  if(t==="trouveMot"){
    pool = D.phrases_analyse.map((ph,i)=>({type:t, cible:def.cible, mots:ph.mots,
      bons: def.cible==="verbe"?[ph.verbe]:def.cible==="sujet"?ph.sujet:ph.objet, __k:i}));
  }
  else if(t==="remettreOrdre"){
    pool = D.ordre.map((o,i)=>({type:t, bon:o.bon, __k:i}));
  }
  else if(t==="pronomSens"){
    const filt = D.pronom_sens.filter(x=> def.serie==="sing"?x.n==="sing":def.serie==="plur"?x.n==="plur":true);
    pool = filt.map((x,i)=>({type:t, pron:x.pron, sens:x.sens, emoji:x.emoji,
      distract: melange(D.pronom_sens.filter(y=>y.pron!==x.pron)).slice(0,2).map(y=>y.sens), __k:i}));
  }
  else if(t==="singPlur"){
    pool = D.pronom_sens.map((x,i)=>({type:t, pron:x.pron, rep:x.n==="sing"?"singulier":"pluriel", emoji:x.emoji, __k:i}));
  }
  else if(t==="remplacePronom"){
    const filt = D.sujets_pronom.filter(x=>x.n===(def.niveau||1));
    pool = filt.map((x,i)=>({type:t, sujet:x.sujet, rep:x.pron,
      distract: melange(["il","elle","ils","elles","nous","vous"].filter(p=>p!==x.pron)).slice(0,2), __k:i}));
  }
  else if(t==="moiJe"){
    const verbes=["mange","travaille","parle","habite","écoute","regarde"];
    pool = verbes.map((vf,i)=>({type:t, verbe:vf, __k:i}));
  }
  else if(t==="associe"){
    // pour chaque verbe et chaque personne : choisir la bonne forme conjuguée
    const temps = def.temps||"pres";
    def.verbes.forEach(inf=>{
      for(let p=0;p<6;p++){
        pool.push({type:t, inf, temps, p});
      }
    });
    pool = pool.map((x,i)=>(x.__k=i,x));
  }
  else if(t==="terminaison"){
    const temps = def.temps||"pres";
    let verbes = def.verbes;
    if(def.futTerm || def.condTerm) verbes = ["parler","manger","habiter","travailler","aimer","regarder"];
    verbes.forEach(inf=>{
      for(let p=0;p<6;p++) pool.push({type:t, inf, temps, p, futTerm:def.futTerm, condTerm:def.condTerm});
    });
    pool = pool.map((x,i)=>(x.__k=i,x));
  }
  else if(t==="completePhrase"){
    const temps = def.temps||"pres";
    let verbes;
    if(def.mix) verbes = VERB_ORDRE.filter(v=>!VERBI[v].pron).slice(0,30);
    else if(def.groupe) verbes = VERB_ORDRE.filter(v=>VERBI[v].g===def.groupe && !VERBI[v].pron).slice(0,12);
    else verbes = VERB_ORDRE.slice(0,20);
    let i=0;
    verbes.forEach(inf=>{
      const ctx = pick(D.contextes.filter(c=>c.v===inf)) || pick(D.contextes);
      const p = Math.floor(Math.random()*6);
      pool.push({type:t, inf, temps, p, compl:ctx.compl, __k:i++});
    });
  }
  else if(t==="choisirAux"){
    // verbes avec être vs avoir
    const etre = VERB_ORDRE.filter(v=>VERBI[v].aux==="être" && !VERBI[v].pron);
    const avoir = VERB_ORDRE.filter(v=>VERBI[v].aux==="avoir").slice(0,20);
    let cand = melange([...etre, ...etre, ...avoir]); // sur-représenter être (rares)
    cand.slice(0,14).forEach((inf,i)=>{
      const p=Math.floor(Math.random()*6);
      pool.push({type:t, inf, p, rep:VERBI[inf].aux, __k:i});
    });
  }
  else if(t==="participe"){
    let verbes;
    if(def.groupe===1) verbes = VERB_ORDRE.filter(v=>VERBI[v].g===1 && !VERBI[v].pron);
    else if(def.groupe===2) verbes = VERB_ORDRE.filter(v=>VERBI[v].g===2);
    else if(def.irr) verbes = VERB_ORDRE.filter(v=>VERBI[v].g===3 && VERBI[v].pp.slice(-1)!=="é" && !VERBI[v].pron);
    else verbes = VERB_ORDRE;
    verbes.forEach((inf,i)=>pool.push({type:t, inf, rep:VERBI[inf].pp, __k:i}));
  }
  else if(t==="accordEtre"){
    const etre = VERB_ORDRE.filter(v=>VERBI[v].aux==="être" && !VERBI[v].pron);
    let i=0;
    etre.forEach(inf=>{
      ["m","f","mp","fp"].forEach(genre=>pool.push({type:t, inf, genre, __k:i++}));
    });
  }
  else if(t==="pcPronominal" || t==="pronominal"){
    const prono = VERB_ORDRE.filter(v=>VERBI[v].pron);
    prono.forEach((inf,i)=>{
      for(let p=0;p<6;p++) pool.push({type:(t==="pronominal"?"pronominal":"pcPronominal"), inf, p, __k:i*6+p});
    });
  }
  else if(t==="negationPC"){
    const verbes = VERB_ORDRE.filter(v=>!VERBI[v].pron).slice(0,16);
    verbes.forEach((inf,i)=>{ const p=Math.floor(Math.random()*6); pool.push({type:t, inf, p, __k:i}); });
  }
  else if(t==="reconnaitrePC"){
    const verbes = VERB_ORDRE.filter(v=>!VERBI[v].pron).slice(0,16);
    verbes.forEach((inf,i)=>{ const p=Math.floor(Math.random()*6); pool.push({type:t, inf, p, __k:i}); });
  }
  else if(t==="construireFP" || t==="construirePR"){
    const verbes = VERB_ORDRE.filter(v=>!VERBI[v].pron).slice(0,20);
    verbes.forEach((inf,i)=>{ const p=Math.floor(Math.random()*6); pool.push({type:t, inf, p, __k:i}); });
  }
  else if(t==="distinguer"){
    const verbes = VERB_ORDRE.filter(v=>!VERBI[v].pron).slice(0,16);
    verbes.forEach((inf,i)=>{
      const p=Math.floor(Math.random()*6);
      const temps = Math.random()<0.5?def.t1:def.t2;
      pool.push({type:t, inf, p, temps, t1:def.t1, t2:def.t2, __k:i});
    });
  }
  else if(t==="imperatif3"){
    const verbes=["manger","écouter","regarder","fermer","parler","travailler"];
    verbes.forEach((inf,i)=>{
      const idx=Math.floor(Math.random()*3); // tu/nous/vous
      pool.push({type:t, inf:(VERBI[inf]?inf:"manger"), idx, __k:i});
    });
    // fallback verbes existants
    pool = pool.filter(x=>VERBI[x.inf]);
    if(pool.length<6){
      ["manger","écouter","regarder","parler","travailler","aimer"].forEach((inf,i)=>{
        if(VERBI[inf]) pool.push({type:t, inf, idx:i%3, __k:100+i});
      });
    }
  }
  else if(t==="imperatifVerbe"){
    const verbes=["venir","faire","prendre","aller","écouter","regarder","manger","parler"].filter(v=>VERBI[v]);
    verbes.forEach((inf,i)=>{ const idx=Math.floor(Math.random()*3); pool.push({type:t, inf, idx, __k:i}); });
  }
  else if(t==="imperatifSituation"){
    pool = D.imperatif_situ.map((s,i)=>({type:t, phrase:s.phrase, rep:s.rep,
      distract: genDistractImp(s.rep), __k:i}));
  }
  else if(t==="politesse"){
    pool = D.politesse.map((s,i)=>({type:t, phrase:s.phrase, rep:s.rep, opts:s.d, __k:i}));
  }
  else {
    pool = [{type:t, __k:0}];
  }

  if(pool.length===0) pool=[{type:t,__k:0}];
  return tirerSansRepeter(cle, pool, Math.min(n, pool.length));
}

function genDistractImp(bon){
  // formes proches incorrectes
  const base = bon.toLowerCase();
  const opts = new Set();
  if(base.endsWith("e")) opts.add(cap(base+"s")), opts.add(cap(base+"r"));
  else opts.add(cap(base+"s"));
  opts.delete(bon);
  return [...opts].slice(0,2);
}
function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

/* ════════════ RENDERERS ════════════ */
// Helper : créer des boutons de choix (avec audio-cliquable + mode oral)
function boutonsChoix(zone, options, repValeur, opts){
  opts = opts || {};
  const oral = E.reglages.modeOral || opts.forceAudio;
  const cont = el(`<div class="choix ${opts.ligne?'ligne':''}"></div>`);
  melange(options).forEach(opt=>{
    const val = typeof opt==="object" ? opt.val : opt;
    const label = typeof opt==="object" ? opt.label : opt;
    const dire = typeof opt==="object" && opt.dire ? opt.dire : label;
    const b = el(`<button class="cbtn ${oral?'audio':''}">${oral?'<span style="opacity:.55;font-size:14px">'+(opts.montrerTexteOral?label:'Proposition')+'</span>':label}</button>`);
    b.onclick = ()=>{
      if(b.dataset.fini) return;
      // en mode oral, le 1er clic lit, le 2e valide ? Non : clic = écoute ; on choisit en re-cliquant ?
      // Simplification : en mode oral, chaque bouton lit à voix haute ; un appui long/2e tap valide.
      // Ici : on lit ET on valide au même clic mais on laisse réécouter avant via bouton dédié.
      parler(dire);
      if(opts.audioSeul){ return; } // ne valide pas, juste écoute
      validerChoixBtn(b, val===repValeur, cont, repValeur, opts.corrLabel);
    };
    b.dataset.val = val;
    b.dataset.dire = dire;
    cont.appendChild(b);
  });
  zone.appendChild(cont);
  return cont;
}

// mode oral avec écoute SANS validation immédiate : on ajoute un bouton "valider mon choix"
function boutonsChoixOral(zone, options, repValeur, opts){
  opts = opts||{};
  let selection = null;
  const cont = el(`<div class="choix ${opts.ligne?'ligne':''}"></div>`);
  melange(options).forEach((opt,i)=>{
    const val = typeof opt==="object"?opt.val:opt;
    const dire = typeof opt==="object"&&opt.dire?opt.dire:(typeof opt==="object"?opt.label:opt);
    const b = el(`<button class="cbtn audio">Proposition ${i+1}</button>`);
    b.onclick = ()=>{
      if(cont.dataset.fini) return;
      parler(dire);
      cont.querySelectorAll('.cbtn').forEach(x=>x.classList.remove('ok'));
      b.style.borderColor = "var(--violet)";
      selection = {b, val};
    };
    b.dataset.val=val; b.dataset.dire=dire;
    cont.appendChild(b);
  });
  zone.appendChild(cont);
  // bouton valider
  const vb = el(`<button class="btn-valider" style="margin-top:12px">Je choisis celle-là ✓</button>`);
  vb.onclick = ()=>{
    if(!selection || cont.dataset.fini) return;
    cont.dataset.fini="1";
    validerChoixBtn(selection.b, selection.val===repValeur, cont, repValeur, opts.corrLabel);
    vb.remove();
  };
  zone.appendChild(vb);
  return cont;
}

function validerChoixBtn(btn, ok, cont, repValeur, corrLabel){
  cont.dataset.fini="1";
  cont.querySelectorAll('.cbtn').forEach(b=>{ b.dataset.fini="1"; b.style.borderColor=""; });
  btn.classList.add(ok?"ok":"ko");
  if(!ok){
    const bon = [...cont.querySelectorAll('.cbtn')].find(b=>b.dataset.val===String(repValeur));
    if(bon) bon.classList.add("ok");
  }
  finQuestion(ok, corrLabel || repValeur);
}

const RENDUS = {};

// ── associe : choisir la bonne forme conjuguée pour pronom + verbe ──
RENDUS.associe = (q, zone)=>{
  const v = VERBI[q.inf];
  const forme = q.temps==="fut" ? v.fut[q.p] : q.temps==="cond" ? v.cond[q.p] : v.pres[q.p];
  const pron = v.pron ? "" : pronomSujet(q.p, forme);
  const phrase = v.pron ? `(${q.inf}) ` : pron;
  // distracteurs : autres formes du même verbe
  const autres = (q.temps==="fut"?v.fut:q.temps==="cond"?v.cond:v.pres).filter((f,i)=>i!==q.p);
  const options = [forme, ...melange(autres).slice(0,2)];
  zone.appendChild(el(`<div class="q-grande">${v.pron?'':'<span class="rempli">'+pron+'</span>'}<span class="trou">?</span>${v.pron?'<br><span style="font-size:16px;color:var(--gris)">verbe : '+q.inf+'</span>':''}</div>`));
  const dire = (v.pron? q.inf+" : " : pron) ;
  const opts = E.reglages.modeOral
    ? boutonsChoixOral(zone, options.map(f=>({val:f,label:f,dire:(v.pron?'':pron)+f})), forme, {ligne:true})
    : boutonsChoix(zone, options.map(f=>({val:f,label:f,dire:(v.pron?'':pron)+f})), forme, {ligne:true});
  parler((v.pron?q.inf:pronAudio(q.p))); 
};
function pronAudio(p){ return ["je","tu","il","nous","vous","ils"][p]; }

// ── terminaison : choisir la terminaison ──
RENDUS.terminaison = (q, zone)=>{
  const v = VERBI[q.inf];
  let formes, forme;
  if(q.futTerm){ formes=v.fut; } else if(q.condTerm){ formes=v.cond; } else { formes = q.temps==="fut"?v.fut:v.pres; }
  forme = formes[q.p];
  const pron = pronomSujet(q.p, forme);
  // séparer radical / terminaison (heuristique : on montre le radical, choisir la fin)
  const term = terminaisonDe(q.inf, forme, q.temps||"pres", q.p, q.futTerm||q.condTerm);
  const radical = forme.slice(0, forme.length-term.t.length);
  const options = melange([term.t, ...term.faux]);
  zone.appendChild(el(`<div class="q-grande"><span class="rempli">${pron}${radical}</span><span class="trou">${'·'.repeat(Math.max(1,term.t.length))}</span></div>`));
  (E.reglages.modeOral?boutonsChoixOral:boutonsChoix)(zone, options, term.t, {ligne:true, corrLabel:forme});
  parler(pron+forme);
};
function terminaisonDe(inf, forme, temps, p, special){
  // renvoie {t: terminaison correcte, faux:[...]}
  if(special){ // futur ou conditionnel : terminaisons fixes
    const fut=["ai","as","a","ons","ez","ont"], cond=["ais","ais","ait","ions","iez","aient"];
    const set = forme.endsWith("ais")||forme.endsWith("ait")||forme.endsWith("aient")||forme.endsWith("ions")||forme.endsWith("iez")?cond:fut;
    const t = set[p];
    const faux = melange(set.filter(x=>x!==t)).slice(0,2);
    return {t, faux};
  }
  // présent : terminaisons par groupe
  const g = VERBI[inf].g;
  let term;
  if(g===1){ term=["e","es","e","ons","ez","ent"][p]; return {t:term, faux:melange(["e","es","ent","ons","ez"].filter(x=>x!==term)).slice(0,2)}; }
  if(g===2){ term=["is","is","it","issons","issez","issent"][p]; return {t:term, faux:melange(["is","it","issons","issent","s"].filter(x=>x!==term)).slice(0,2)}; }
  // g3 : on prend les 2-3 dernières lettres
  term = ["s","s","t","ons","ez","ent"][p];
  if(!forme.endsWith(term)) term = forme.slice(-2);
  return {t:term, faux:melange(["s","t","ons","ez","ent","x"].filter(x=>x!==term)).slice(0,2)};
}

// ── completePhrase : phrase à trou avec le verbe ──
RENDUS.completePhrase = (q, zone)=>{
  const v=VERBI[q.inf];
  let forme;
  if(q.temps==="pres") forme=v.pres[q.p];
  else if(q.temps==="fut") forme=v.fut[q.p];
  else if(q.temps==="cond") forme=v.cond[q.p];
  else if(q.temps==="pc") forme=ppComplet(q.inf,q.p);
  else if(q.temps==="fp") forme="va".replace('va',VERBI["aller"].pres[q.p])+" "+v.infDit;
  else forme=v.pres[q.p];
  const pron = pronomSujet(q.p, (q.temps==="fp"?VERBI["aller"].pres[q.p]:forme));
  const compl = q.compl||"";
  const options = genFormesProches(q.inf, q.temps||"pres", q.p, forme);
  zone.appendChild(el(`<div class="q-grande"><span class="rempli">${cap(pron)}</span><span class="trou">?</span> <span class="rempli">${compl}</span>.</div>`));
  (E.reglages.modeOral?boutonsChoixOral:boutonsChoix)(zone, options, forme, {ligne:true, corrLabel:forme});
  parler(cap(pron)+forme+" "+compl);
};
function ppComplet(inf,p){
  const v=VERBI[inf];
  const aux = v.aux==="être"?VERBI["être"].pres[p]:VERBI["avoir"].pres[p];
  return aux+" "+v.pp;
}
function genFormesProches(inf, temps, p, bonne){
  const v=VERBI[inf];
  let set;
  if(temps==="pres") set=v.pres; else if(temps==="fut") set=v.fut; else if(temps==="cond") set=v.cond;
  else if(temps==="pc") set=[0,1,2,3,4,5].map(i=>ppComplet(inf,i));
  else if(temps==="fp") set=[0,1,2,3,4,5].map(i=>VERBI["aller"].pres[i]+" "+v.infDit);
  else set=v.pres;
  const autres = set.filter((f,i)=>i!==p && f!==bonne);
  return [bonne, ...melange([...new Set(autres)]).slice(0,2)];
}

  const auxEtre = VERBI["être"].pres[q.p], auxAvoir = VERBI["avoir"].pres[q.p];
  const options = [{val:"être",label:"ÊTRE",dire:cap(pronomSujet(q.p,auxEtre))+auxEtre+" "+v.pp},
                   {val:"avoir",label:"AVOIR",dire:cap(pronomSujet(q.p,auxAvoir))+auxAvoir+" "+v.pp}];

// ── participe : choisir le participe passé ──
RENDUS.participe = (q, zone)=>{
  const v=VERBI[q.inf];
  zone.appendChild(el(`<div class="q-grande">${q.inf}<br>→ j'ai / je suis <span class="trou">?</span></div>`));
  const faux = genPPFaux(q.inf, v.pp);
  const options = [v.pp, ...faux];
  (E.reglages.modeOral?boutonsChoixOral:boutonsChoix)(zone, options, v.pp, {ligne:true});
  parler(q.inf+"... participe passé ?");
};
function genPPFaux(inf, pp){
  const base = inf.replace(/er$|ir$|re$|oir$/,"");
  const cand = new Set([base+"é", base+"i", base+"u", base+"is", base+"it"]);
  cand.delete(pp);
  return melange([...cand]).slice(0,2);
}

RENDUS.construireFP = (q, zone)=>{ construireSemiAux(q, zone, "fp"); };
RENDUS.construirePR = (q, zone)=>{ construireSemiAux(q, zone, "pr"); };
function construireSemiAux(q, zone, mode){
  const v=VERBI[q.inf];
  const semi = mode==="fp"?VERBI["aller"].pres[q.p]:(VERBI["venir"].pres[q.p]+" de");
  const pron=pronomSujet(q.p, mode==="fp"?VERBI["aller"].pres[q.p]:VERBI["venir"].pres[q.p]);
  const bonne = semi+" "+v.infDit;
  // distracteurs
  const f1 = semi+" "+v.pres[q.p];
  const f2 = (mode==="fp"?VERBI["aller"].pres[(q.p+1)%6]:VERBI["venir"].pres[(q.p+1)%6]+" de")+" "+v.infDit;
  zone.appendChild(el(`<div class="q-grande"><span class="rempli">${cap(pron)}</span><span class="trou">?</span></div><div style="text-align:center;color:var(--gris);font-size:15px">verbe : ${q.inf}</div>`));
  (E.reglages.modeOral?boutonsChoixOral:boutonsChoix)(zone, [bonne,f1,f2], bonne, {corrLabel:cap(pron)+bonne});
  parler(cap(pron)+bonne);
}

  const noms={pres:"présent",fp:"futur proche",pc:"passé composé",pr:"passé récent",fut:"futur"};
  if(q.temps==="pres"){ phrase=cap(pron)+v.pres[q.p]; rep="pres"; }
  else if(q.temps==="fp"){ phrase=cap(pron)+VERBI["aller"].pres[q.p]+" "+v.infDit; rep="fp"; }
  else if(q.temps==="pc"){ phrase=cap(pron)+ppComplet(q.inf,q.p); rep="pc"; }
  else if(q.temps==="pr"){ phrase=cap(pron)+VERBI["venir"].pres[q.p]+" de "+v.infDit; rep="pr"; }

};

  const cible=el(`<div class="ordre-cible"></div>`);

  let placed=[];
  melange(q.bon).forEach(txt=>{
    const e=el(`<div class="etiq">${txt}</div>`);
    e.onclick=()=>{
      if(e.classList.contains('placed'))return;
      e.classList.add('placed');
      const c=e.cloneNode(true); c.classList.add('in-cible');
      c.onclick=()=>{ c.remove(); e.classList.remove('placed'); placed=placed.filter(x=>x!==txt); };
      cible.appendChild(c); placed.push(txt);
      if(placed.length===q.bon.length){
        const ok=placed.join(" ")===q.bon.join(" ");
        cible.style.borderColor = ok?"var(--vert)":"var(--rouge)";
        finQuestion(ok, q.bon.join(" "));
      }
    };
    source.appendChild(e);
  });
  zone.appendChild(cible); zone.appendChild(source);
  parler("Remets les mots dans le bon ordre.");
};

  const v=VERBI[q.inf];
  const pron=pronomSujet(q.p,"x");
  const noms={pres:"présent",fut:"futur",pc:"passé composé",fp:"futur proche",pr:"passé récent",cond:"conditionnel",imp:"impératif"};
  // 50% du temps on montre la BONNE forme au temps q.temps, 50% une AUTRE forme
  const correct = Math.random()<0.6;
  let phrase, rep;
  if(correct){
    phrase = formeAuTemps(q.inf, q.temps, q.p, pron);
    rep="oui";
  } else {
    // montrer un autre temps
    const autres=["pres","pc","fp","fut","pr"].filter(t=>t!==q.temps);
    const t2=pick(autres);
    phrase=formeAuTemps(q.inf, t2, q.p, pron);
    rep="non";
  }
  zone.appendChild(el(`<div class="q-grande">${phrase}</div><div style="text-align:center;color:var(--gris);font-size:15px">C'est bien le <b>${noms[q.temps]}</b> ?</div>`));
  (E.reglages.modeOral?boutonsChoixOral:boutonsChoix)(zone, [{val:"oui",label:"✅ OUI"},{val:"non",label:"❌ NON"}], rep, {ligne:true});
  parler(phrase);
};
function formeAuTemps(inf, t, p, pron){
  const v=VERBI[inf];
  if(t==="pres") return cap(pron)+v.pres[p];
  if(t==="fut") return cap(pron)+v.fut[p];
  if(t==="cond") return cap(pron)+v.cond[p];
  if(t==="pc") return cap(pronomSujet(p, v.aux==="être"?VERBI["être"].pres[p]:VERBI["avoir"].pres[p]))+ppComplet(inf,p);
  if(t==="fp") return cap(pronomSujet(p,VERBI["aller"].pres[p]))+VERBI["aller"].pres[p]+" "+v.infDit;
  if(t==="pr") return cap(pronomSujet(p,VERBI["venir"].pres[p]))+VERBI["venir"].pres[p]+" de "+v.infDit;
  return cap(pron)+v.pres[p];
}
