<!DOCTYPE html><html lang="fr"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Mon Coach Lexique BTP</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@500;700;800&family=Noto+Naskh+Arabic:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{--bleu:#2563EB;--bleu-d:#1E40AF;--creme:#FAFAF8;--txt:#111827;--gris:#6B7280;
--epi:#DC2626;--outils:#2563EB;--machines:#7C3AED;--materiaux:#D97706;--techniques:#059669;--ouvrages:#0891B2;--elements:#DB2777;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Nunito',sans-serif;background:var(--creme);color:var(--txt);min-height:100vh}
.wrap{max-width:900px;margin:0 auto;padding:16px 16px 90px}
.hidden{display:none!important}
h1,h2,.baloo{font-family:'Baloo 2',cursive}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.back{background:#fff;border:2px solid #E5E7EB;border-radius:12px;padding:8px 14px;font-weight:800;font-size:15px;cursor:pointer;color:var(--bleu-d)}
.title{font-size:22px;font-weight:800;color:var(--bleu-d);font-family:'Baloo 2'}
.sub{color:var(--gris);font-size:14px;margin-top:2px}
.hello{font-size:15px;color:var(--gris)}
/* tuiles accueil */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px}
.tile{border:none;border-radius:20px;padding:26px 18px;color:#fff;text-align:left;cursor:pointer;font-family:'Baloo 2';box-shadow:0 4px 14px rgba(0,0,0,.08)}
.tile .emo{font-size:40px;display:block;margin-bottom:8px}
.tile .t{font-size:22px;font-weight:800}
.tile .d{font-size:13px;font-weight:600;opacity:.9;font-family:'Nunito'}
.tile.imagier{background:linear-gradient(135deg,#2563EB,#1E40AF)}
.tile.entrainement{background:linear-gradient(135deg,#059669,#047857)}
/* sélecteur langue */
.langrow{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
.langbtn{border:2px solid #E5E7EB;background:#fff;border-radius:20px;padding:7px 14px;font-weight:800;font-size:14px;cursor:pointer;color:#374151}
.langbtn.on{background:var(--bleu);color:#fff;border-color:var(--bleu)}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:6px}
@media(min-width:640px){.cat-grid{grid-template-columns:1fr 1fr 1fr}}
.cat-tile{border:none;border-radius:16px;padding:18px 14px;color:#fff;text-align:left;cursor:pointer;font-family:'Baloo 2';font-weight:800;font-size:17px;box-shadow:0 3px 10px rgba(0,0,0,.07)}
.cat-tile small{display:block;font-family:'Nunito';font-weight:700;font-size:12px;opacity:.9;margin-top:3px}
/* recherche */
.search{width:100%;border:2px solid #E5E7EB;border-radius:14px;padding:12px 14px;font-size:16px;font-family:'Nunito';margin-bottom:12px}
/* galerie */
.gal{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(min-width:640px){.gal{grid-template-columns:1fr 1fr 1fr}}
.card{background:#fff;border:2px solid #EFEFEC;border-radius:16px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column}
.card img{width:100%;height:120px;object-fit:cover;background:#F3F4F6}
.card .nm{padding:8px 10px;font-weight:800;font-size:14px}
.card .tr{padding:0 10px 8px;font-size:13px;color:var(--gris);font-weight:700}
.rtl{direction:rtl;font-family:'Noto Naskh Arabic','Nunito',serif}
/* détail */
.detail{background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.1)}
.detail img{width:100%;max-height:340px;object-fit:contain;background:#F3F4F6}
.detail .body{padding:16px 18px}
.detail .nm{font-size:24px;font-weight:800;font-family:'Baloo 2';display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.spk{background:var(--bleu);color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;flex-shrink:0}
.met{font-style:italic;color:#9CA3AF;font-size:13px;font-weight:700}
.usage{font-size:16px;margin-top:8px;line-height:1.5}
.trbox{margin-top:14px;background:#F0F6FF;border-radius:12px;padding:12px 14px}
.trbox .lbl{font-size:12px;font-weight:800;color:var(--bleu-d);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.trbox .tn{font-size:19px;font-weight:800}
.trbox .tu{font-size:15px;color:#374151;margin-top:3px}
.warn{font-size:12px;color:#B45309;margin-top:8px}
/* exercices */
.exo-choice{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.exo-tile{border:2px solid #E5E7EB;background:#fff;border-radius:16px;padding:16px;text-align:left;cursor:pointer;font-family:'Baloo 2';font-weight:800;font-size:16px}
.exo-tile .emo{font-size:26px;display:block;margin-bottom:6px}
.exo-tile small{display:block;font-family:'Nunito';font-weight:700;font-size:12px;color:var(--gris);margin-top:3px}
.scorebar{display:flex;align-items:center;gap:12px;background:#fff;border-radius:14px;padding:10px 14px;margin-bottom:12px;border:2px solid #EFEFEC}
.score{font-family:'Baloo 2';font-size:22px;font-weight:800;color:#059669}
.qbox{background:#fff;border-radius:18px;padding:18px;border:2px solid #EFEFEC;text-align:center}
.qimg{width:100%;max-height:260px;object-fit:contain;background:#F3F4F6;border-radius:12px}
.qtext{font-size:20px;font-weight:800;font-family:'Baloo 2';margin:6px 0}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.opt{border:2px solid #E5E7EB;background:#fff;border-radius:14px;padding:14px;font-size:15px;font-weight:800;cursor:pointer;min-height:56px}
.opt img{width:100%;height:90px;object-fit:cover;border-radius:8px}
.opt.good{background:#DCFCE7;border-color:#22C55E}
.opt.bad{background:#FEE2E2;border-color:#EF4444}
.btn{background:var(--bleu);color:#fff;border:none;border-radius:14px;padding:13px 22px;font-weight:800;font-size:16px;cursor:pointer;font-family:'Nunito';margin-top:12px}
.btn.sec{background:#fff;color:var(--bleu-d);border:2px solid #E5E7EB}
/* relier */
.relier{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.relier .col-lbl{font-size:11px;font-weight:800;color:var(--gris);text-transform:uppercase;text-align:center;margin-bottom:4px}
.ritem{border:2px solid #E5E7EB;background:#fff;border-radius:12px;padding:8px;margin-bottom:8px;cursor:pointer;font-size:13px;font-weight:700;min-height:56px;display:flex;align-items:center;justify-content:center;text-align:center}
.ritem img{width:100%;height:70px;object-fit:cover;border-radius:8px}
.ritem.sel{border-color:var(--bleu);background:#EFF6FF;box-shadow:0 0 0 2px var(--bleu)}
.ritem.done{opacity:.45;pointer-events:none;border-color:#22C55E;background:#DCFCE7}
.ritem.flash-bad{border-color:#EF4444;background:#FEE2E2}
.foot{position:fixed;bottom:0;left:0;right:0;text-align:center;font-size:11px;color:#9CA3AF;padding:6px;background:rgba(250,250,248,.9)}
.msg{text-align:center;font-weight:800;margin-top:10px;min-height:22px}
.msg.ok{color:#059669}.msg.no{color:#DC2626}
</style></head><body>
<div class="wrap">
  <!-- ACCUEIL -->
  <div id="s-home">
    <div class="title" style="font-size:26px">🧱 Mon Coach Lexique BTP</div>
    <div class="hello" id="hello"></div>
    <div class="tiles" style="margin-top:16px">
      <button class="tile imagier" onclick="go('imagier-cat')"><span class="emo">📚</span><span class="t">Imagier</span><div class="d">Voir les mots, les photos, écouter</div></button>
      <button class="tile entrainement" onclick="go('exo-cat')"><span class="emo">🎯</span><span class="t">Entraînement</span><div class="d">Jouer et réviser</div></button>
    </div>
    <div style="margin-top:22px" class="sub">Langue d'appui (pour l'imagier)</div>
    <div class="langrow" id="langrow-home"></div>
  </div>

  <!-- IMAGIER : catégories -->
  <div id="s-imagier-cat" class="hidden">
    <div class="topbar"><button class="back" onclick="go('home')">← Accueil</button><div><div class="title">📚 Imagier</div><div class="sub">Choisis une catégorie</div></div></div>
    <div class="cat-grid" id="imagier-cats"></div>
  </div>

  <!-- IMAGIER : galerie -->
  <div id="s-imagier-gal" class="hidden">
    <div class="topbar"><button class="back" onclick="go('imagier-cat')">← Catégories</button><div><div class="title" id="gal-title"></div><div class="sub" id="gal-count"></div></div></div>
    <input class="search" id="search" placeholder="🔎 Chercher un mot…" oninput="renderGal()">
    <div class="langrow" id="langrow-gal"></div>
    <div class="gal" id="gal"></div>
  </div>

  <!-- IMAGIER : détail -->
  <div id="s-detail" class="hidden">
    <div class="topbar"><button class="back" onclick="go('imagier-gal')">← Retour</button></div>
    <div class="detail" id="detail"></div>
  </div>

  <!-- EXO : catégories -->
  <div id="s-exo-cat" class="hidden">
    <div class="topbar"><button class="back" onclick="go('home')">← Accueil</button><div><div class="title">🎯 Entraînement</div><div class="sub">1. Choisis une catégorie</div></div></div>
    <div class="cat-grid" id="exo-cats"></div>
  </div>
  <!-- EXO : type -->
  <div id="s-exo-type" class="hidden">
    <div class="topbar"><button class="back" onclick="go('exo-cat')">← Catégories</button><div><div class="title" id="exotype-title"></div><div class="sub">2. Choisis un exercice</div></div></div>
    <div class="exo-choice">
      <button class="exo-tile" onclick="startExo('relier')"><span class="emo">🔗</span>Relier les 3<small>Photo · Nom · Usage</small></button>
      <button class="exo-tile" onclick="startExo('photo2nom')"><span class="emo">🖼️</span>Photo → Nom<small>Trouve le bon mot</small></button>
      <button class="exo-tile" onclick="startExo('nom2photo')"><span class="emo">🔤</span>Nom → Photo<small>Trouve la bonne image</small></button>
      <button class="exo-tile" onclick="startExo('usage2nom')"><span class="emo">💬</span>Usage → Nom<small>Lis, trouve le mot</small></button>
    </div>
  </div>
  <!-- EXO : jeu -->
  <div id="s-exo-play" class="hidden">
    <div class="topbar"><button class="back" onclick="go('exo-type')">← Exercices</button><div><div class="title" id="play-title"></div></div></div>
    <div class="scorebar"><div class="score" id="score">0</div><div class="sub" id="progress"></div><button class="btn sec" style="margin:0 0 0 auto;padding:8px 14px" onclick="startExo(state.exo)">↺</button></div>
    <div id="play-area"></div>
    <div class="msg" id="msg"></div>
  </div>

  <div class="foot">Mon Coach Lexique BTP · v1.0 · Mon Assistant de Formation</div>
</div>

const LANGS = [["fr","Français 🇫🇷"],["ar","العربية"],["fa","دری"],["ps","پښتو"],["ru","Русский"],["en","English"]];
const RTL = ["ar","fa","ps"];
const CATS = ["EPI","Outils","Machines","Matériaux","Techniques","Ouvrages finaux","Éléments d'ouvrage"];
const CATEMO = {"EPI":"🦺","Outils":"🔧","Machines":"🚜","Matériaux":"🧱","Techniques":"🛠️","Ouvrages finaux":"🏠","Éléments d'ouvrage":"📐"};
const CATVAR = {"EPI":"--epi","Outils":"--outils","Machines":"--machines","Matériaux":"--materiaux","Techniques":"--techniques","Ouvrages finaux":"--ouvrages","Éléments d'ouvrage":"--elements"};
let state = {screen:"home", appui: localStorage.getItem("maf_lex_appui")||"fr", cat:null, exo:null};

// prénom partagé
let prenom = localStorage.getItem("maf_commun")||"";
function hello(){
  const h=document.getElementById("hello");
  if(prenom){h.textContent="Salut "+prenom+" ! 👋";}
  else{h.innerHTML='<button class="langbtn" onclick="askName()">✏️ Dis-moi ton prénom</button>';}
}
function askName(){const p=prompt("Ton prénom ?");if(p){prenom=p.trim();localStorage.setItem("maf_commun",prenom);hello();}}

function speak(t){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang="fr-FR";u.rate=.9;speechSynthesis.speak(u);}catch(e){}}

function setAppui(l){state.appui=l;localStorage.setItem("maf_lex_appui",l);renderLangRows();if(state.screen=="imagier-gal")renderGal();}
function renderLangRows(){
  ["langrow-home","langrow-gal"].forEach(id=>{
    const el=document.getElementById(id); if(!el)return; el.innerHTML="";
    LANGS.forEach(([code,label])=>{
      const b=document.createElement("button");b.className="langbtn"+(state.appui==code?" on":"");
      b.textContent=label; if(RTL.includes(code))b.classList.add("rtl");
      b.onclick=()=>setAppui(code); el.appendChild(b);
    });
  });
}

function go(scr){
  state.screen=scr;
  ["home","imagier-cat","imagier-gal","detail","exo-cat","exo-type","exo-play"].forEach(s=>{
    document.getElementById("s-"+s).classList.toggle("hidden", s!=scr);
  });
  window.scrollTo(0,0);
  if(scr=="imagier-cat")renderCats("imagier-cats","gotoGal");
  if(scr=="exo-cat")renderCats("exo-cats","gotoExoType");
  if(scr=="home"){hello();renderLangRows();}
}
function renderCats(elId, cb){
  const el=document.getElementById(elId);el.innerHTML="";
  const all=document.createElement("button");all.className="cat-tile";all.style.background="linear-gradient(135deg,#374151,#111827)";
  all.innerHTML='🗂️ Tout<small>'+DATA.length+' mots</small>';all.onclick=()=>window[cb](null);el.appendChild(all);
  CATS.forEach(c=>{
    const n=DATA.filter(e=>e.cat==c).length; if(!n)return;
    const b=document.createElement("button");b.className="cat-tile";
    b.style.background="var("+CATVAR[c]+")";
    b.innerHTML=CATEMO[c]+" "+c+"<small>"+n+" mots</small>";
    b.onclick=()=>window[cb](c);el.appendChild(b);
  });
}
function items(cat){return cat?DATA.filter(e=>e.cat==cat):DATA.slice();}

// ---- IMAGIER ----
function gotoGal(cat){state.cat=cat;document.getElementById("search").value="";document.getElementById("gal-title").textContent=cat?(CATEMO[cat]+" "+cat):"🗂️ Tout";go("imagier-gal");renderLangRows();renderGal();}
function renderGal(){
  const q=(document.getElementById("search").value||"").toLowerCase().trim();
  let list=items(state.cat);
  if(q)list=list.filter(e=>e.nom.toLowerCase().includes(q)||(TRAD[e.nom]&&Object.values(TRAD[e.nom]).some(v=>v.toLowerCase().includes(q))));
  document.getElementById("gal-count").textContent=list.length+" mot"+(list.length>1?"s":"");
  const g=document.getElementById("gal");g.innerHTML="";
  list.forEach(e=>{
    const c=document.createElement("div");c.className="card";c.onclick=()=>showDetail(e.id);
    let tr="";
    if(state.appui!="fr"&&TRAD[e.nom]){const t=TRAD[e.nom][state.appui];tr='<div class="tr'+(RTL.includes(state.appui)?" rtl":"")+'">'+t+'</div>';}
    c.innerHTML='<img loading="lazy" src="'+e.img+'"><div class="nm">'+e.nom+'</div>'+tr;
    g.appendChild(c);
  });
}
function showDetail(id){
  const e=DATA.find(x=>x.id==id);state.lastId=id;
  const d=document.getElementById("detail");
  const met=e.metier?'<span class="met">'+e.metier+'</span>':"";
  let trbox="";
  if(state.appui!="fr"&&TRAD[e.nom]){
    const t=TRAD[e.nom][state.appui];const cls=RTL.includes(state.appui)?" rtl":"";
    const lab=LANGS.find(l=>l[0]==state.appui)[1];
    trbox='<div class="trbox"><div class="lbl">'+lab+'</div><div class="tn'+cls+'">'+t+'</div></div><div class="warn">⚠️ Traduction à faire vérifier par un locuteur.</div>';
  }
  d.innerHTML='<img src="'+e.img+'"><div class="body"><div class="nm">'+e.nom+' '+met+
    '<button class="spk" onclick="speak(\''+e.nom.replace(/'/g,"\\'")+'\')">🔊</button></div>'+
    '<div class="usage">'+e.usage+'</div>'+trbox+'</div>';
  go("detail");
}

// ---- EXERCICES ----
function gotoExoType(cat){state.cat=cat;document.getElementById("exotype-title").textContent=cat?(CATEMO[cat]+" "+cat):"🗂️ Tout";go("exo-type");}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
let score=0,qn=0,qtot=0;
function startExo(type){
  state.exo=type;score=0;qn=0;
  const titles={relier:"🔗 Relier les 3",photo2nom:"🖼️ Photo → Nom",nom2photo:"🔤 Nom → Photo",usage2nom:"💬 Usage → Nom"};
  document.getElementById("play-title").textContent=titles[type];
  document.getElementById("msg").textContent="";
  go("exo-play");
  qtot = (type=="relier")?5:8;
  updateScore();
  if(type=="relier")roundRelier();else roundQcm();
}
function updateScore(){document.getElementById("score").textContent=score;document.getElementById("progress").textContent="Question "+Math.min(qn+1,qtot)+" / "+qtot;}
function pool(){let p=items(state.cat).filter(e=>e.img);return p;}
function endRound(){
  const a=document.getElementById("play-area");
  a.innerHTML='<div class="qbox"><div class="qtext">Terminé ! 🎉</div><div style="font-size:20px;font-weight:800;color:#059669">Score : '+score+' / '+qtot+'</div>'+
    '<button class="btn" onclick="startExo(state.exo)">Rejouer</button> <button class="btn sec" onclick="go(\'exo-type\')">Autre exercice</button></div>';
  document.getElementById("progress").textContent="Fini";
}
// QCM
function roundQcm(){
  if(qn>=qtot){endRound();return;}
  updateScore();document.getElementById("msg").textContent="";
  const p=pool();const good=p[Math.floor(Math.random()*p.length)];
  let others=shuffle(p.filter(e=>e.id!=good.id)).slice(0,3);
  const opts=shuffle([good,...others]);
  const a=document.getElementById("play-area");const type=state.exo;
  let head="";
  if(type=="photo2nom")head='<img class="qimg" src="'+good.img+'">';
  else if(type=="nom2photo")head='<div class="qtext">'+good.nom+' <button class="spk" onclick="speak(\''+good.nom.replace(/\x27/g,"\\x27")+'\')">🔊</button></div>';
  else if(type=="usage2nom")head='<div class="qtext" style="font-size:17px">'+good.usage+'</div>';
  let html='<div class="qbox">'+head+'<div class="opts" id="opts"></div></div>';
  a.innerHTML=html;
  const oc=document.getElementById("opts");
  opts.forEach(e=>{
    const b=document.createElement("button");b.className="opt";
    if(type=="nom2photo")b.innerHTML='<img src="'+e.img+'">';else b.textContent=e.nom;
    b.onclick=()=>{
      if(b.dataset.done)return;
      [...oc.children].forEach(x=>x.dataset.done=1);
      if(e.id==good.id){b.classList.add("good");score++;document.getElementById("msg").className="msg ok";document.getElementById("msg").textContent="Bravo ! 👍";}
      else{b.classList.add("bad");[...oc.children].forEach(x=>{if(x.textContent==good.nom||(type=="nom2photo"&&x.querySelector("img")&&x.querySelector("img").src.endsWith(good.img)))x.classList.add("good");});
        document.getElementById("msg").className="msg no";document.getElementById("msg").textContent="Réponse : "+good.nom;}
      qn++;setTimeout(()=>roundQcm(),1300);
    };
    oc.appendChild(b);
  });
}
// RELIER les 3
let rSel={photo:null,nom:null,usage:null},rItems=[];
function roundRelier(){
  updateScore();document.getElementById("msg").textContent="";
  const p=shuffle(pool()).slice(0,4);rItems=p;rSel={photo:null,nom:null,usage:null};
  const a=document.getElementById("play-area");
  const cols={photo:shuffle(p),nom:shuffle(p),usage:shuffle(p)};
  let html='<div class="qbox"><div style="font-size:13px;color:#6B7280;font-weight:700;margin-bottom:8px">Touche une photo, son nom, puis son usage.</div><div class="relier">';
  html+='<div><div class="col-lbl">Photo</div><div id="col-photo"></div></div>';
  html+='<div><div class="col-lbl">Nom</div><div id="col-nom"></div></div>';
  html+='<div><div class="col-lbl">Usage</div><div id="col-usage"></div></div></div></div>';
  a.innerHTML=html;
  ["photo","nom","usage"].forEach(kind=>{
    const c=document.getElementById("col-"+kind);
    cols[kind].forEach(e=>{
      const d=document.createElement("div");d.className="ritem";d.dataset.id=e.id;d.dataset.kind=kind;
      if(kind=="photo")d.innerHTML='<img src="'+e.img+'">';
      else if(kind=="nom")d.textContent=e.nom;
      else d.textContent=e.usage.length>60?e.usage.slice(0,58)+"…":e.usage;
      d.onclick=()=>pickRelier(d,kind,e.id);c.appendChild(d);
    });
  });
}
function pickRelier(el,kind,id){
  const col=el.parentElement;
  [...col.children].forEach(x=>{if(x!=el)x.classList.remove("sel");});
  if(rSel[kind]==el){el.classList.remove("sel");rSel[kind]=null;return;}
  el.classList.add("sel");rSel[kind]=el;
  if(rSel.photo&&rSel.nom&&rSel.usage){
    const ids=[rSel.photo.dataset.id,rSel.nom.dataset.id,rSel.usage.dataset.id];
    if(ids[0]==ids[1]&&ids[1]==ids[2]){
      [rSel.photo,rSel.nom,rSel.usage].forEach(x=>{x.classList.remove("sel");x.classList.add("done");});
      score++;updateScore();
      rSel={photo:null,nom:null,usage:null};
      if(document.querySelectorAll("#play-area .ritem.done").length>=rItems.length*3){
        qn=qtot;document.getElementById("msg").className="msg ok";document.getElementById("msg").textContent="Tout relié ! 🎉";
        setTimeout(endRound,1000);
      }
    } else {
      const sel=[rSel.photo,rSel.nom,rSel.usage];
      sel.forEach(x=>x.classList.add("flash-bad"));
      document.getElementById("msg").className="msg no";document.getElementById("msg").textContent="Pas ensemble, réessaie.";
      setTimeout(()=>{sel.forEach(x=>{x.classList.remove("flash-bad","sel");});rSel={photo:null,nom:null,usage:null};document.getElementById("msg").textContent="";},700);
    }
  }
}
