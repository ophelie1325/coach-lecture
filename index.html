<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#2563EB">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Mon Coach Lecture</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@500;700;800&display=swap');

:root{
  --bleu:#2563EB; --bleu-fonce:#1E40AF; --bleu-pale:#EFF6FF;
  --vert:#059669; --vert-pale:#ECFDF5; --vert-vif:#22C55E;
  --orange:#EA580C; --orange-pale:#FFF7ED;
  --violet:#7C3AED; --violet-pale:#F5F3FF;
  --rouge:#DC2626; --rouge-pale:#FEF2F2;
  --jaune:#F59E0B; --creme:#FAFAF8; --gris:#6B7280; --gris-pale:#F3F4F6;
  --texte:#111827;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Nunito',sans-serif; background:var(--creme); color:var(--texte);
  font-size:17px; line-height:1.5; overscroll-behavior:none;
  user-select:none; -webkit-user-select:none;
}
#app{max-width:480px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;padding:16px 16px 32px}
button{font-family:'Nunito',sans-serif;border:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
input{font-family:'Nunito',sans-serif}

/* ── composants génériques ── */
.titre{font-family:'Baloo 2',sans-serif;font-weight:800;line-height:1.15}
.btn{
  display:flex;align-items:center;justify-content:center;gap:10px;
  width:100%;min-height:62px;border-radius:18px;
  font-size:19px;font-weight:800;color:#fff;background:var(--bleu);
  box-shadow:0 4px 0 rgba(0,0,0,.18);transition:transform .08s;
}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.18)}
.btn.vert{background:var(--vert)} .btn.orange{background:var(--orange)}
.btn.violet{background:var(--violet)} .btn.gris{background:#9CA3AF}
.btn.blanc{background:#fff;color:var(--texte);border:2px solid #E5E7EB;box-shadow:0 3px 0 #E5E7EB}
.btn:disabled{opacity:.45;pointer-events:none}
.btn-ico{
  width:60px;height:60px;min-height:60px;border-radius:50%;font-size:26px;
  background:#fff;border:2px solid #E5E7EB;box-shadow:0 3px 0 #E5E7EB;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.btn-ico:active{transform:translateY(2px)}
.card{background:#fff;border-radius:20px;padding:18px;border:2px solid #EEE9E2;box-shadow:0 2px 6px rgba(0,0,0,.04)}
.center{text-align:center}
.row{display:flex;gap:12px;align-items:center}
.spacer{flex:1}
.petit{font-size:13.5px;color:var(--gris)}

/* ── en-tête ── */
.top{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.top .retour{width:46px;height:46px;border-radius:14px;background:#fff;border:2px solid #E5E7EB;font-size:20px}
.flamme{
  margin-left:auto;background:#FFF3E0;border:2px solid #FFD9A8;border-radius:20px;
  padding:6px 14px;font-weight:900;font-size:16px;color:#C2540A;display:flex;gap:6px;align-items:center
}

/* ── accueil ── */
.hero{margin:6px 0 18px}
.hero h1{font-size:30px;color:var(--bleu-fonce)}
.parcours-card{
  display:flex;align-items:center;gap:14px;width:100%;text-align:left;
  background:#fff;border-radius:22px;padding:16px;margin-bottom:14px;
  border:2.5px solid;box-shadow:0 4px 0 rgba(0,0,0,.07);transition:transform .08s
}
.parcours-card:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.07)}
.pc-emoji{font-size:38px;width:62px;height:62px;border-radius:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pc-titre{font-family:'Baloo 2';font-size:19px;font-weight:800}
.pc-sub{font-size:13.5px;color:var(--gris);margin-top:2px}
.pc-prog{height:9px;background:#F0EDE7;border-radius:6px;margin-top:8px;overflow:hidden}
.pc-prog>div{height:100%;border-radius:6px;transition:width .4s}

/* ── carte de niveaux ── */
.chemin{display:flex;flex-direction:column;gap:6px;padding:8px 0 20px}
.niv-row{display:flex;justify-content:center}
.niv-row:nth-child(odd){justify-content:flex-start;padding-left:14%}
.niv-row:nth-child(even){justify-content:flex-end;padding-right:14%}
.niveau{
  width:88px;height:88px;border-radius:50%;background:#fff;
  border:4px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 5px 0 rgba(0,0,0,.10);font-weight:900;position:relative
}
.niveau:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.10)}
.niveau .num{font-family:'Baloo 2';font-size:24px}
.niveau .etoiles{font-size:12px;letter-spacing:-1px}
.niveau.verrou{filter:grayscale(1);opacity:.55}
.niveau .badge-trophee{position:absolute;top:-8px;right:-8px;font-size:24px}
.niv-label{font-size:11.5px;color:var(--gris);text-align:center;max-width:110px;margin-top:5px;line-height:1.25}
.niv-wrap{display:flex;flex-direction:column;align-items:center}

/* ── session / question ── */
.q-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.q-picto{font-size:26px;width:48px;height:48px;background:#fff;border:2px solid #E5E7EB;border-radius:14px;display:flex;align-items:center;justify-content:center}
.q-bar{flex:1;height:14px;background:#EFEAE3;border-radius:8px;overflow:hidden}
.q-bar>div{height:100%;background:var(--vert-vif);border-radius:8px;transition:width .35s}
.q-flag{width:42px;height:42px;border-radius:12px;background:#fff;border:2px solid #E5E7EB;font-size:17px;opacity:.75}
.q-zone{flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px;padding:8px 0}
.q-audio{display:flex;gap:14px;justify-content:center}
.gros-mot{
  font-family:'Baloo 2';font-size:46px;font-weight:800;text-align:center;
  letter-spacing:2px;color:var(--bleu-fonce);word-break:break-word;line-height:1.2
}
.gros-mot.moyen{font-size:32px;letter-spacing:1px}
.gros-mot.phrase{font-size:27px;letter-spacing:.5px}
.choix{display:flex;flex-direction:column;gap:12px}
.choix.ligne{flex-direction:row}
.choix-btn{
  flex:1;min-height:74px;border-radius:20px;background:#fff;border:3px solid #E2DDD4;
  font-family:'Baloo 2';font-size:32px;font-weight:800;color:var(--texte);
  box-shadow:0 4px 0 #E2DDD4;transition:transform .08s
}
.choix-btn.texte{font-size:21px;font-family:'Nunito';font-weight:800}
.choix-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #E2DDD4}
.choix-btn.ok{background:var(--vert-pale);border-color:var(--vert-vif);box-shadow:0 4px 0 var(--vert-vif);color:var(--vert)}
.choix-btn.ko{background:var(--rouge-pale);border-color:#FCA5A5;box-shadow:0 4px 0 #FCA5A5;color:var(--rouge)}
.lettres-mot{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.lettre-btn{
  width:56px;height:64px;border-radius:14px;background:#fff;border:3px solid #E2DDD4;
  font-family:'Baloo 2';font-size:30px;font-weight:800;box-shadow:0 3px 0 #E2DDD4
}
.lettre-btn.sel{background:var(--bleu-pale);border-color:var(--bleu);color:var(--bleu);box-shadow:0 3px 0 var(--bleu)}
.lettre-btn.ok{background:var(--vert-pale);border-color:var(--vert-vif);color:var(--vert);box-shadow:0 3px 0 var(--vert-vif)}
.lettre-btn.ko{background:var(--rouge-pale);border-color:#FCA5A5;color:var(--rouge);box-shadow:0 3px 0 #FCA5A5}
.lettre-btn.espace{visibility:hidden;width:20px}
.slots{display:flex;gap:8px;justify-content:center}
.slot{
  width:56px;height:64px;border-radius:14px;background:var(--gris-pale);
  border:3px dashed #D5CFC5;display:flex;align-items:center;justify-content:center;
  font-family:'Baloo 2';font-size:30px;font-weight:800
}
.slot.plein{background:#fff;border-style:solid;border-color:var(--bleu);color:var(--bleu-fonce)}
.feedback{
  text-align:center;font-family:'Baloo 2';font-size:23px;font-weight:800;min-height:34px
}
.feedback.ok{color:var(--vert)} .feedback.ko{color:var(--rouge)}
.consigne-lien{
  text-align:center;font-size:13px;color:#B7B0A6;text-decoration:underline;
  background:none;width:100%;padding:10px 0 0;margin-top:auto
}
.consigne-texte{
  background:#FFFBEB;border:2px solid #FDE68A;border-radius:14px;
  padding:12px 14px;font-size:15px;text-align:center;color:#92400E;font-weight:700
}
.dictee-input{
  width:100%;min-height:64px;border-radius:16px;border:3px solid #E2DDD4;
  font-family:'Baloo 2';font-size:30px;font-weight:800;text-align:center;
  background:#fff;color:var(--bleu-fonce);letter-spacing:2px;
}
.dictee-input:focus{outline:none;border-color:var(--bleu)}
.mots-boxes{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.mot-box{min-width:84px;max-width:46%;flex:1}
.mot-box input{
  width:100%;min-height:54px;border-radius:14px;border:3px solid #E2DDD4;background:#fff;
  font-family:'Baloo 2';font-size:22px;font-weight:800;text-align:center;color:var(--bleu-fonce)
}
.corrige{font-family:'Baloo 2';font-size:30px;text-align:center;letter-spacing:2px}
.corrige .b{color:var(--vert)} .corrige .m{color:var(--rouge);text-decoration:underline}

/* ── résultat ── */
.resultat{flex:1;display:flex;flex-direction:column;justify-content:center;text-align:center;gap:16px}
.res-etoiles{font-size:52px;letter-spacing:4px}
.res-score{font-family:'Baloo 2';font-size:40px;font-weight:800;color:var(--bleu-fonce)}

/* ── doigt fantôme / démo ── */
#doigt{
  position:fixed;font-size:46px;z-index:1000;pointer-events:none;display:none;
  transition:left .9s ease-in-out, top .9s ease-in-out;
  filter:drop-shadow(0 3px 4px rgba(0,0,0,.3));transform:rotate(-15deg)
}
.demo-bandeau{
  background:var(--violet-pale);border:2px solid #DDD6FE;border-radius:14px;
  padding:10px;text-align:center;font-weight:800;color:var(--violet);font-size:16px
}
.voile{pointer-events:none}

/* ── progrès ── */
.prog-ligne{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1.5px solid #F1EDE6;font-weight:700}
.prog-ligne:last-child{border:none}

/* ── divers ── */
.onboard{flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;text-align:center}
.onboard input{
  width:100%;min-height:60px;border-radius:16px;border:3px solid #E2DDD4;
  font-size:22px;font-weight:800;text-align:center;background:#fff
}
.onboard input:focus{outline:none;border-color:var(--bleu)}
select{
  width:100%;min-height:52px;border-radius:14px;border:2px solid #E2DDD4;
  background:#fff;font-family:'Nunito';font-size:16px;font-weight:700;padding:0 12px
}
.syl-row{display:flex;justify-content:center;align-items:center;flex-wrap:wrap;transition:gap .6s ease}
.syl-bloc{font-family:'Baloo 2';font-size:40px;font-weight:800;padding:2px 12px;border-radius:14px;transition:transform .25s, box-shadow .25s;line-height:1.2}
.syl-bloc.mot{font-size:24px;padding:2px 8px}
.syl-bloc.c0{background:var(--bleu-pale);color:var(--bleu-fonce);border:2.5px solid #BFDBFE}
.syl-bloc.c1{background:var(--orange-pale);color:#9A3412;border:2.5px solid #FED7AA}
.syl-bloc.actif{transform:scale(1.28);box-shadow:0 4px 14px rgba(0,0,0,.18)}
.syl-bloc.fusion{border-color:transparent;background:transparent;color:var(--bleu-fonce);padding:2px 0}
.abc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.abc-btn{background:#fff;border-radius:16px;border:3px solid;box-shadow:0 3px 0 rgba(0,0,0,.08);
  padding:8px 2px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .15s}
.abc-btn:active{transform:translateY(2px)}
.abc-btn.vue{border-color:#BFDBFE}
.abc-btn.nouvelle{border-color:#FED7AA}
.abc-btn.actif{transform:scale(1.1);border-color:var(--vert-vif);background:var(--vert-pale)}
.abc-paire{font-family:'Baloo 2';font-size:22px;font-weight:800;color:var(--bleu-fonce)}
.abc-mot{font-size:10.5px;color:var(--gris);font-weight:700}
.abc-pastille{display:inline-block;width:12px;height:12px;border-radius:4px;vertical-align:-1px;margin-right:4px}
.abc-pastille.bleu{background:#BFDBFE}
.abc-pastille.orange{background:#FED7AA}
.mic-rec{background:#FEE2E2 !important;border-color:#EF4444 !important;animation:pulser 1s infinite}
@keyframes pulser{50%{transform:scale(1.12)}}
@keyframes pop{0%{transform:scale(.6)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
.pop{animation:pop .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.shake{animation:shake .35s}
</style>
</head>
<body>
<div id="app"></div>
<div id="doigt">👆</div>
<script>
"use strict";
/* ════════════════════════════════════════════════════════════
   MON COACH LECTURE — v1.4
   HOPE 2026 · contenu validé par la formatrice (banque Excel v1)
   ════════════════════════════════════════════════════════════ */

/* ── ÉTAT ───────────────────────────────────────────────── */
const DEFAUT = {
  prenom:"", onboarde:false,
  niveaux:{p1:{},p2:{},p3:{}},          // {1:{stars:2}, ...}
  serie:{n:0, dernier:""},
  demosVues:{},
  rates:[],                              // clés d'items ratés (révision)
  signales:[],                           // items neutralisés
  totaux:{sessions:0, bonnes:0, posees:0},
  reglages:{voix:"", debit:0.92}
};
let memoire = null;                      // secours si stockage indisponible
function chargerEtat(){
  try{
    const brut = localStorage.getItem("mcf_v1");
    if(brut){ const e = JSON.parse(brut); return Object.assign(JSON.parse(JSON.stringify(DEFAUT)), e); }
  }catch(err){}
  return memoire ? memoire : JSON.parse(JSON.stringify(DEFAUT));
}
function sauverEtat(){
  memoire = E;
  try{ localStorage.setItem("mcf_v1", JSON.stringify(E)); }catch(err){}
}
let E = chargerEtat();
const VERSION = "1.4";

/* ── AUDIO : voix de synthèse ───────────────────────────── */
let voixFR = [];
function chargerVoix(){
  voixFR = speechSynthesis.getVoices().filter(v => v.lang && v.lang.toLowerCase().startsWith("fr"));
}
if("speechSynthesis" in window){
  chargerVoix();
  speechSynthesis.onvoiceschanged = chargerVoix;
}
function voixChoisie(){
  if(E.reglages.voix){ const v = voixFR.find(v=>v.voiceURI===E.reglages.voix); if(v) return v; }
  return voixFR.find(v=>v.lang.toLowerCase()==="fr-fr") || voixFR[0] || null;
}
function parler(texte, opts){
  return new Promise(res=>{
    if(!("speechSynthesis" in window)){ res(); return; }
    speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(texte);
    u.lang = "fr-FR";
    const v = voixChoisie(); if(v) u.voice = v;
    u.rate = (opts && opts.lent) ? 0.6 : E.reglages.debit;
    u.onend = ()=>res(); u.onerror = ()=>res();
    speechSynthesis.speak(u);
  });
}

/* sons "bruit" des lettres : consonne + e muet, version prononçable par la voix */
const SON_TTS = {
  a:"a", e:"euh", i:"i", o:"o", u:"u",
  l:"le", m:"meuh", s:"se", r:"re", n:"ne", t:"te", p:"peu", f:"feu", v:"vœu", b:"bœufs", d:"de",
  ou:"ou", an:"an", on:"on", oi:"oie", "é":"et", "è":"haie", ch:"che", j:"jeu", z:"ze", gn:"gne"
};
/* réécriture phonétique pour la voix : évite que BE, TO, SO, NO, IS, US…
   soient lus comme des mots ANGLAIS par le moteur du téléphone */
const VMAP = { a:"a", e:"e", i:"i", o:"au", u:"u", "é":"ais" };
/* 66 syllabes consonne+voyelle → vrai mot français (ou forme courte sans homographe anglais) */
const DIRE_CV = {
  la:"la", le:"le", li:"lit", lo:"lot", lu:"lu", "lé":"les",
  ma:"ma", me:"meuh", mi:"mi", mo:"mot", mu:"mue", "mé":"mes",
  sa:"sa", se:"se", si:"si", so:"seau", su:"su", "sé":"ses",
  ra:"rat", re:"re", ri:"rit", ro:"rot", ru:"rue", "ré":"ré",
  na:"na", ne:"ne", ni:"ni", no:"nos", nu:"nu", "né":"né",
  ta:"ta", te:"te", ti:"ti", to:"tôt", tu:"tu", "té":"tes",
  pa:"pas", pe:"peu", pi:"pie", po:"pot", pu:"pu", "pé":"paix",
  fa:"fa", fe:"feu", fi:"fi", fo:"faux", fu:"fut", "fé":"fée",
  va:"va", ve:"vœu", vi:"vie", vo:"veau", vu:"vu", "vé":"vais",
  ba:"bas", be:"bœufs", bi:"bi", bo:"beau", bu:"bu", "bé":"bée",
  da:"da", de:"de", di:"dit", do:"dos", du:"du", "dé":"dé"
};
const VCMAP = { al:"alle", il:"île", ol:"olle", ul:"ulle", ar:"are", ir:"ire", or:"hors", ur:"ure",
                as:"asse", is:"isse", os:"osse", us:"usse", af:"affe", if:"iffe" };
function direSyllabe(syl){
  const s = syl.toLowerCase();
  if(DIRE_CV[s]) return DIRE_CV[s];
  if(VCMAP[s]) return VCMAP[s];
  if(s.length===2 && CONS.includes(s[0]) && VMAP[s[1]] !== undefined) return s[0] + VMAP[s[1]];
  return s;
}
function direSon(s, opts){ return parler(SON_TTS[s] !== undefined ? SON_TTS[s] : s, opts); }

/* petits sons de feedback (bips doux, non vocaux) */
let ctxAudio = null;
function bip(freqs){
  try{
    if(!ctxAudio) ctxAudio = new (window.AudioContext||window.webkitAudioContext)();
    let t = ctxAudio.currentTime;
    freqs.forEach(f=>{
      const o = ctxAudio.createOscillator(), g = ctxAudio.createGain();
      o.type="sine"; o.frequency.value=f;
      g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(0.18,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.22);
      o.connect(g); g.connect(ctxAudio.destination); o.start(t); o.stop(t+0.25); t+=0.12;
    });
  }catch(err){}
}
const dingOK = ()=>bip([660,880]);
const dingKO = ()=>bip([220]);
const dingFin = ()=>bip([523,659,784]);

/* ── BANQUES DE CONTENU (validées) ──────────────────────── */
const VOY = ["a","e","i","o","u"];
const CONS = ["l","m","s","r","n","t","p","f","v","b","d"];
const VOY_SYL = ["A","E","I","O","U","É"];

const B = {
p1:{
 1:{ titre:"Les voyelles", picto:"👂", type:"paireVoyelles",
     items:[["a","i"],["a","o"],["i","o"],["i","u"],["o","u"],["a","u"],["e","a"],["e","i"],["e","o"],["e","u"]] },
 2:{ titre:"Je reconnais les voyelles", picto:"🔤", type:"sonVersLettre",
     items:[
      {son:"a",rep:"A",d:["I","O"]},{son:"i",rep:"I",d:["E","U"]},{son:"o",rep:"O",d:["A","U"]},
      {son:"u",rep:"U",d:["I","O"]},{son:"e",rep:"E",d:["A","I"]},{son:"a",rep:"A",d:["E","U"]},
      {son:"i",rep:"I",d:["A","O"]},{son:"o",rep:"O",d:["E","I"]},{son:"u",rep:"U",d:["A","E"]},
      {son:"e",rep:"E",d:["O","U"]}] },
 3:{ titre:"Majuscule et minuscule", picto:"🔠", type:"majMin",
     items:[
      {maj:"A",min:"a",d:["o","e"]},{maj:"B",min:"b",d:["d","p"]},{maj:"D",min:"d",d:["b","p"]},
      {maj:"E",min:"e",d:["a","c"]},{maj:"F",min:"f",d:["t","l"]},{maj:"I",min:"i",d:["l","j"]},
      {maj:"L",min:"l",d:["i","t"]},{maj:"M",min:"m",d:["n","w"]},{maj:"N",min:"n",d:["m","u"]},
      {maj:"O",min:"o",d:["a","c"]},{maj:"P",min:"p",d:["b","q"]},{maj:"R",min:"r",d:["n","v"]},
      {maj:"S",min:"s",d:["z","c"]},{maj:"T",min:"t",d:["f","l"]},{maj:"U",min:"u",d:["n","v"]},
      {maj:"V",min:"v",d:["u","w"]}] },
 4:{ titre:"Les consonnes L M S R", picto:"🔤", type:"sonMotLettre",
     items:[

function decoupeDe(txt, direFinal){
  if(txt.includes(" ")) return txt.split(" ").map(m=>[m, m]);     // phrase → mots
  const low = txt.toLowerCase();
  if(SYLL[low]){
    let pos = 0;
    return SYLL[low].map(([s,d])=>{ const aff = txt.slice(pos, pos+s.length); pos += s.length; return [aff, d]; });
  }
  if(txt.length===2 && SON_TTS[low[0]]!==undefined && SON_TTS[low[1]]!==undefined)
    return [[txt[0], SON_TTS[low[0]]],[txt[1], SON_TTS[low[1]]]];  // syllabe → lettres
  return [[txt, direFinal||low]];                                   // bloc unique
}
let DECOUPE_EN_COURS = false;
async function jouerDecoupe(holder, txt, direFinal){
  if(DECOUPE_EN_COURS) return;
  DECOUPE_EN_COURS = true;
  const parts = decoupeDe(txt, direFinal);
  const phrase = txt.includes(" ");
  const avant = holder.innerHTML;
  holder.innerHTML = `<div class="syl-row" style="gap:${parts.length>1?14:0}px">`+
    parts.map(([aff],i)=>`<span class="syl-bloc ${phrase?"mot":""} c${i%2}">${aff}</span>`).join("")+`</div>`;
  const blocs = [...holder.querySelectorAll(".syl-bloc")];
  await attendre(350);
  for(let i=0;i<parts.length;i++){
    blocs[i].classList.add("actif");
    await parler(parts[i][1], {lent:true});
    blocs[i].classList.remove("actif");
    await attendre(200);
  }
  if(parts.length>1){
    holder.querySelector(".syl-row").style.gap = "0px";   // fusion
    await attendre(650);
    blocs.forEach(b=>b.classList.add("fusion"));
    await parler(direFinal || txt);
    await attendre(350);
  }
  holder.innerHTML = avant;
  DECOUPE_EN_COURS = false;
}

/* ── MICRO : je m'enregistre, je me compare ── */
let MICRO = null;
function microDispo(){ return !!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia && window.MediaRecorder); }
function nettoyerMicro(){
  if(!MICRO) return;
  try{ if(MICRO.recorder && MICRO.recorder.state!=="inactive") MICRO.recorder.stop(); }catch(e){}
  try{ if(MICRO.stream) MICRO.stream.getTracks().forEach(t=>t.stop()); }catch(e){}
  try{ if(MICRO.audio) MICRO.audio.pause(); }catch(e){}
  try{ if(MICRO.url) URL.revokeObjectURL(MICRO.url); }catch(e){}
  MICRO = null;
}
function brancherMicro(zone){
  const btnMic = zone.querySelector("#mic");
  const btnMoi = zone.querySelector("#moi");
  if(!btnMic) return;
  if(!microDispo()){ btnMic.style.display="none"; return; }
  btnMic.onclick = async ()=>{
    if(MICRO && MICRO.recorder && MICRO.recorder.state==="recording"){
      MICRO.recorder.stop();
      btnMic.textContent="🎤"; btnMic.classList.remove("mic-rec");
      return;
    }
    try{
      nettoyerMicro();
      const stream = await navigator.mediaDevices.getUserMedia({audio:true});
      const recorder = new MediaRecorder(stream);
      const chunks = [];
      recorder.ondataavailable = e=>{ if(e.data && e.data.size) chunks.push(e.data); };
      recorder.onstop = ()=>{
        stream.getTracks().forEach(t=>t.stop());
        if(!chunks.length) return;
        const blob = new Blob(chunks, {type: recorder.mimeType || "audio/webm"});
        MICRO.url = URL.createObjectURL(blob);
        if(btnMoi){ btnMoi.style.display="flex"; }
      };
      MICRO = {stream, recorder, chunks, url:null, audio:null};
      recorder.start();
      btnMic.textContent="⏹"; btnMic.classList.add("mic-rec");
    }catch(e){ btnMic.style.display="none"; }
  };
  if(btnMoi) btnMoi.onclick = ()=>{
    if(!MICRO || !MICRO.url) return;
    try{ if(MICRO.audio) MICRO.audio.pause(); MICRO.audio = new Audio(MICRO.url); MICRO.audio.play(); }catch(e){}
  };
}

/* ── OUTILS ─────────────────────────────────────────────── */
const $ = sel => document.querySelector(sel);
const app = document.getElementById("app");
function melange(a){ const t=[...a]; for(let i=t.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[t[i],t[j]]=[t[j],t[i]];} return t; }
function tire(a,n){ return melange(a).slice(0,n); }
function attendre(ms){ return new Promise(r=>setTimeout(r,ms)); }
function html(strings,...vals){ return strings.map((s,i)=>s+(vals[i]!==undefined?vals[i]:"")).join(""); }
function majSerie(){
  const auj = new Date().toISOString().slice(0,10);
  if(E.serie.dernier === auj) return;
  const hier = new Date(Date.now()-86400000).toISOString().slice(0,10);
  E.serie.n = (E.serie.dernier === hier) ? E.serie.n+1 : 1;
  E.serie.dernier = auj;
}
function etoilesDe(stars){ return "⭐".repeat(stars) + "☆".repeat(Math.max(0,3-stars)); }
function lettresIntruses(mot, n){
  const pool = "abdefijlmnoprstuv".split("").filter(c => !mot.toLowerCase().includes(c));
  return tire(pool, n).map(c => c.toUpperCase());
}

/* ════════════════════════════════════════════════════════
   GÉNÉRATEURS DE QUESTIONS
   chaque question : {type, cle, ...données}
   ════════════════════════════════════════════════════════ */
function genQuestions(p, lvl, n){
  const def = B[p][lvl];
  n = n || 10;
  if(def.type === "bilan"){
    let toutes = [];
    for(let l=1; l<=9; l++) toutes = toutes.concat(genQuestions(p, l, 2));
    return tire(toutes, def.n);
  }
  let items;
  if(def.genere === "CV"){
    items = [];
    CONS.forEach(c => VOY_SYL.forEach(v => {
      const syl = c + v.toLowerCase();
      items.push({aff: syl.toUpperCase(), dire: direSyllabe(syl)});
    }));
  } else items = def.items;
  const dispo = items.map((it,i)=>({it, cle:`${p}-${lvl}-${i}`}))
                     .filter(x => !E.signales.includes(x.cle));
  const choisis = tire(dispo, Math.min(n, dispo.length));
  return choisis.map(x => Object.assign({type:def.type, cle:x.cle, phrase:!!def.phrase}, JSON.parse(JSON.stringify(x.it))));
}

let SESSION = null;
async function lancerSession(p, lvl){
  const def = B[p][lvl];
  const qs = genQuestions(p, lvl, 10);
  if(!qs.length){ parler("Plus de questions disponibles ici."); return; }
  SESSION = {p, lvl, qs, idx:0, bonnes:0, libre:false};
  const typePremier = qs[0].type;
  if(!E.demosVues[typePremier]){
    await jouerDemo(typePremier, qs[0], p, lvl);
  }
  afficherQuestion();
}

function afficherQuestion(){
  nettoyerMicro(); DECOUPE_EN_COURS = false;
  const S = SESSION;
  if(S.idx >= S.qs.length){ finSession(); return; }
  const q = S.qs[S.idx];
  const cons = CONSIGNES[q.type] || {picto:"🎯", texte:""};
  const P = S.libre ? PARCOURS.p2 : PARCOURS[S.p];
  app.innerHTML = html`
    <div class="q-head">
      <button class="q-picto" id="picto" title="Réécouter la consigne">${cons.picto}</button>
      <div class="q-bar"><div style="width:${Math.round(S.idx/S.qs.length*100)}%"></div></div>
      <button class="q-flag" id="flag" title="Signaler un problème">⚠️</button>
      <button class="q-flag" id="quitter">✖</button>
    </div>
    <div class="q-zone" id="zone"></div>
    <div id="bloc-consigne"></div>
    <button class="consigne-lien" id="voirconsigne">📄 voir la consigne</button>`;
  const zone = $("#zone");
  const fini = (ok)=>{
    if(ok) S.bonnes++;
    else if(!E.rates.includes(q.cle)){ E.rates.push(q.cle); if(E.rates.length>120) E.rates.shift(); }
    S.idx++; sauverEtat(); afficherQuestion();
  };
  const demoVue = E.demosVues[q.type];
  // consigne orale au tout début de la session seulement
  if(S.idx===0 && demoVue) parler(cons.texte);
  RENDUS[q.type](q, zone, fini);
  $("#picto").onclick=()=>parler(cons.texte);
  $("#voirconsigne").onclick=()=>{
    $("#bloc-consigne").innerHTML = `<div class="consigne-texte">${cons.texte}</div>`;
    $("#voirconsigne").style.display="none";
  };
  $("#quitter").onclick=()=>{ nettoyerMicro(); try{speechSynthesis.cancel();}catch(e){} S.libre ? ecranAccueil() : ecranParcours(S.p); };
  $("#flag").onclick=()=>{
    if(confirm("Signaler un problème sur cette question ?\nElle sera retirée et envoyée à la formatrice.")){
      if(!E.signales.includes(q.cle)) E.signales.push(q.cle);
      sauverEtat();
      S.idx++; afficherQuestion();
    }
  };
}

function finSession(){
  nettoyerMicro();
  const S = SESSION;
  try{speechSynthesis.cancel();}catch(e){}
  const n = S.qs.length, b = S.bonnes, pct = b/n;
  const stars = pct>=0.9?3 : pct>=0.7?2 : pct>=0.5?1 : 0;
  majSerie();
  E.totaux.sessions++; E.totaux.bonnes+=b; E.totaux.posees+=n;
  if(!S.libre){
    const prev = E.niveaux[S.p][S.lvl];
    if(!prev || stars > prev.stars) E.niveaux[S.p][S.lvl] = {stars};
  }
  sauverEtat();
  dingFin();
  const messages = stars===3?"Incroyable ! 🎉":stars===2?"Très bien joué ! 💪":stars===1?"C’est gagné ! 👍":"Presque ! Réessaie 💪";
  app.innerHTML = html`
    <div class="resultat">
      <div class="res-etoiles pop">${stars>0?etoilesDe(stars):"💪"}</div>
      <div class="res-score">${b} / ${n}</div>
      <div class="titre" style="font-size:24px">${messages}</div>
      <button class="btn" id="rejouer">🔄 Rejouer</button>
      <button class="btn ${stars>0?"vert":"gris"}" id="continuer">${S.libre?"⚡ Nouvelle session":"➡ Continuer"}</button>
      <button class="btn blanc" id="accueil">🏠 Accueil</button>
    </div>`;
  parler(stars>0 ? ("Bravo "+E.prenom+" ! "+b+" bonnes réponses sur "+n+" !") : ("Tu as eu "+b+" bonnes réponses sur "+n+". Réessaie, tu vas y arriver !"));
  $("#rejouer").onclick=()=>{ S.libre ? lancerLibre(S.mode) : lancerSession(S.p, S.lvl); };
  $("#continuer").onclick=()=>{ S.libre ? lancerLibre(S.mode) : ecranParcours(S.p); };
  $("#accueil").onclick=ecranAccueil;
}

function lancerLibre(mode){
  let pool;
  if(mode==="lecture"){
    pool = LIBRE.map((w,i)=>({type:"lecture", cle:"L-"+i, aff:w.m, dire:w.m}));
  } else {
    pool = LIBRE.filter(w=>w.d).map((w,i)=>({type:"dicteeLibre", cle:"D-"+i, mot:w.m}));
  }
  pool = pool.filter(q=>!E.signales.includes(q.cle));
  // pondération : les ratés reviennent
  const rates = pool.filter(q=>E.rates.includes(q.cle));
  let qs = tire(pool, 10);
  if(rates.length){
    const injecter = tire(rates, Math.min(3, rates.length));
    qs = melange([...qs.slice(0, 10-injecter.length), ...injecter]);
  }
  qs = qs.map(q=>JSON.parse(JSON.stringify(q)));
  SESSION = {p:null, lvl:null, qs, idx:0, bonnes:0, libre:true, mode};
  const t = qs[0].type;
  if(!E.demosVues[t]) jouerDemo(t, qs[0]).then(afficherQuestion);
  else afficherQuestion();
}

/* ── DÉMO AUTO-RÉSOLUE (doigt fantôme) ──────────────────── */
const doigt = document.getElementById("doigt");
async function pointerVers(el){
  if(!el) return;
  const r = el.getBoundingClientRect();
  doigt.style.display="block";
  doigt.style.left = (r.left + r.width/2 - 10) + "px";
  doigt.style.top = (r.top + r.height/2 + 6) + "px";
  await attendre(1000);
}
async function jouerDemo(type, qModele, p, lvl){
  return new Promise(async (resoudre)=>{
    const cons = CONSIGNES[type];
    const q = JSON.parse(JSON.stringify(qModele));
    app.innerHTML = html`
      <div class="demo-bandeau">🎬 Regarde l’exemple…</div>
      <div class="q-zone voile" id="zone"></div>`;
    const zone = $("#zone");
    let resolu = false;
    const fini = ()=>{ if(resolu) return; resolu = true; };
    await parler(cons.texte);
    const ctl = RENDUS[type](q, zone, fini);
    await attendre(600);
    // séquence du doigt selon le type
    if(ctl.lectureDemo){
      await pointerVers(ctl.cible());
      ctl.cible().click(); await attendre(1800);
      const oui = ctl.cible2 && ctl.cible2();
      if(oui){ await pointerVers(oui); oui.classList.add("ok"); dingOK(); }
    } else if(ctl.sequence && ctl.cibles){
      for(const el of ctl.cibles()){
        if(!el) continue;
        await pointerVers(el);
        el.click();
        await attendre(250);
      }
      await attendre(1200);
    } else if(ctl.cibles){
      for(const el of ctl.cibles()){
        await pointerVers(el);
        el.classList.add("sel");
        await attendre(300);
      }
      if(ctl.valider){
        await pointerVers(ctl.valider());
        ctl.cibles().forEach(el=>{el.classList.remove("sel");el.classList.add("ok");});
        dingOK();
      }
    } else if(ctl.phraseDemo){
      for(let i=0;i<ctl.phraseDemo.length;i++){
        const inp = zone.querySelector(`input[data-i="${i}"]`);
        if(!inp) continue;
        for(let k=1;k<=ctl.phraseDemo[i].length;k++){ inp.value = ctl.phraseDemo[i].slice(0,k); await attendre(110); }
      }
      await pointerVers(ctl.cible());
      ctl.cible().click(); await attendre(900);
    } else if(ctl.saisieDemo){
      const inp = $("#saisie");
      if(inp){
        for(let i=1;i<=ctl.saisieDemo.length;i++){ inp.value = ctl.saisieDemo.slice(0,i); await attendre(180); }
        await pointerVers(ctl.cible());
        inp.style.borderColor="var(--vert-vif)"; dingOK();
      }
    } else if(ctl.cible){
      const el = ctl.cible();
      await pointerVers(el);
      if(el){ el.classList.add(el.classList.contains("lettre-btn")?"ok":"ok"); dingOK(); }
    }
    await attendre(900);
    doigt.style.display="none";
    try{speechSynthesis.cancel();}catch(e){}
    E.demosVues[type]=true; sauverEtat();
    app.innerHTML = html`
      <div class="onboard">
        <div style="font-size:64px" class="pop">🎯</div>
        <h2 class="titre" style="font-size:28px;color:var(--bleu-fonce)">À toi !</h2>
        <button class="btn vert" id="go">C’est parti ▶</button>
        <button class="btn blanc" id="revoir">🎬 Revoir l’exemple</button>
      </div>`;
    parler("À toi de jouer !");
    $("#go").onclick=()=>resoudre();
    $("#revoir").onclick=async ()=>{ delete E.demosVues[type]; await jouerDemo(type,qModele,p,lvl); resoudre(); };
  });
}

      <span class="petit"><span class="abc-pastille bleu"></span> dans les exercices</span>
      <span class="petit"><span class="abc-pastille orange"></span> autres lettres</span>
    </div>`;
  $("#retour").onclick=ecranAccueil;
  app.querySelectorAll(".abc-btn").forEach(b=>{
    b.onclick = async ()=>{
      if(b.classList.contains("actif")) return;
      const a = ALPHABET[parseInt(b.dataset.i)];
      app.querySelectorAll(".abc-btn").forEach(x=>x.classList.remove("actif"));
      b.classList.add("actif");
      await parler("La lettre... "+a.nom+"... comme dans... "+a.mot+".");
      b.classList.remove("actif");
    };
  });
  parler("Touche une lettre pour l’écouter.");
}

/* ── PROGRÈS ────────────────────────────────────────────── */
function ecranProgres(){
  const lignes = Object.keys(PARCOURS).map(p=>{
    const P=PARCOURS[p], prog=progParcours(p);
    let totalStars=0; for(let l=1;l<=10;l++) totalStars += (E.niveaux[p][l]?E.niveaux[p][l].stars:0);
    return `<div class="prog-ligne"><span style="font-size:24px">${P.emoji}</span>
      <span style="flex:1">${P.nom}</span>
      <span style="color:${P.brut}">${prog.done}/10 · ${totalStars}⭐</span></div>`;
  }).join("");
  const pctOK = E.totaux.posees ? Math.round(E.totaux.bonnes/E.totaux.posees*100) : 0;
  app.innerHTML = html`
    <div class="top">
      <button class="retour" id="retour">←</button>
      <div class="titre" style="font-size:21px;color:var(--bleu-fonce)">📊 Mes progrès</div>
    </div>
    <div class="card" style="margin-bottom:14px">
      <div class="prog-ligne"><span style="font-size:24px">🔥</span><span style="flex:1">Jours d’affilée</span><b>${E.serie.n||0}</b></div>
      <div class="prog-ligne"><span style="font-size:24px">🎮</span><span style="flex:1">Sessions jouées</span><b>${E.totaux.sessions}</b></div>
      <div class="prog-ligne"><span style="font-size:24px">✅</span><span style="flex:1">Bonnes réponses</span><b>${E.totaux.bonnes} (${pctOK}%)</b></div>
    </div>
    <div class="card" style="margin-bottom:18px">${lignes}</div>
    <button class="btn vert" id="partager">📤 Envoyer mes progrès à la formatrice</button>
    <p class="petit center" style="margin-top:10px">Ça ouvre WhatsApp avec un message déjà écrit.</p>`;
  $("#retour").onclick=ecranAccueil;
  $("#partager").onclick=()=>{
    const auj = new Date().toLocaleDateString("fr-FR");
    let txt = `📊 Mon Coach Lecture v${VERSION} — ${E.prenom} — ${auj}\n`;
    txt += `🔥 ${E.serie.n||0} jours d’affilée · 🎮 ${E.totaux.sessions} sessions · ✅ ${pctOK}% de réussite\n`;
    Object.keys(PARCOURS).forEach(p=>{
      const prog = progParcours(p);
      let st=0; for(let l=1;l<=10;l++) st += (E.niveaux[p][l]?E.niveaux[p][l].stars:0);
      txt += `${PARCOURS[p].emoji} ${PARCOURS[p].nom} : ${prog.done}/10 niveaux, ${st} étoiles\n`;
    });
    if(E.signales.length) txt += `⚠️ Questions signalées : ${E.signales.join(", ")}\n`;
    window.open("https://wa.me/?text="+encodeURIComponent(txt), "_blank");
  };
}

/* ── RÉGLAGES ───────────────────────────────────────────── */
function ecranReglages(){
  chargerVoix();
  const opts = voixFR.map(v=>`<option value="${v.voiceURI}" ${E.reglages.voix===v.voiceURI?"selected":""}>${v.name}</option>`).join("");
  app.innerHTML = html`
    <div class="top">
      <button class="retour" id="retour">←</button>
      <div class="titre" style="font-size:21px;color:var(--bleu-fonce)">⚙️ Réglages</div>
    </div>
    <div class="card" style="display:flex;flex-direction:column;gap:14px">
      <div>
        <b>🗣 Choix de la voix</b>
        <select id="voix"><option value="">Voix automatique</option>${opts}</select>
      </div>
      <div>
        <b>⏱ Vitesse de la voix</b>
        <div class="choix ligne" style="margin-top:8px">
          <button class="choix-btn texte" data-d="0.75" style="min-height:54px">🐢 Lente</button>
          <button class="choix-btn texte" data-d="0.92" style="min-height:54px">🙂 Normale</button>
        </div>
      </div>
      <button class="btn" id="essai" style="min-height:54px">🔊 Essayer la voix</button>
    </div>
    <div class="card" style="margin-top:14px">
      <b>👤 Prénom</b>
      <input id="prenom" type="text" value="${E.prenom}" style="width:100%;min-height:50px;border-radius:12px;border:2px solid #E2DDD4;font-size:18px;font-weight:800;text-align:center;margin-top:8px">
    </div>
    <button class="btn blanc" id="sauver" style="margin-top:16px">💾 Enregistrer</button>`;
  $("#retour").onclick=ecranAccueil;
  app.querySelectorAll("[data-d]").forEach(b=>{
    if(parseFloat(b.dataset.d)===E.reglages.debit) b.classList.add("sel");
    b.onclick=()=>{ app.querySelectorAll("[data-d]").forEach(x=>x.classList.remove("sel")); b.classList.add("sel"); E.reglages.debit=parseFloat(b.dataset.d); };
  });
  $("#essai").onclick=()=>{ E.reglages.voix = $("#voix").value; parler("Bonjour ! Voici ma voix. On apprend le français ensemble !"); };
  $("#sauver").onclick=()=>{
    E.reglages.voix = $("#voix").value;
    const p = $("#prenom").value.trim(); if(p) E.prenom = p;
    sauverEtat(); ecranAccueil();
  };
}

/* ── DÉMARRAGE ──────────────────────────────────────────── */
window.addEventListener("load", ()=>{
  if(!E.onboarde || !E.prenom) ecranOnboard();
  else ecranAccueil();
});
</script>
</body>
</html>
